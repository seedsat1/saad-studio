name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to saadstudio VPS
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Validate deploy secrets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER || secrets.SSH_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || secrets.VPS_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for v in SSH_HOST SSH_USER SSH_KEY DEPLOY_PATH; do
            if [ -z "${!v:-}" ]; then
              echo "::error::$v is not set"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "Deploy secrets are present (host/user/key/path). Port=${SSH_PORT}"

      - name: Trigger remote deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER || secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT || '' }}
          command_timeout: 20m
          debug: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || secrets.VPS_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH secret is not set" >&2
              exit 1
            fi

            cd "$DEPLOY_PATH"

            echo "==> git fetch & reset to origin/main"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> npm ci"
            npm ci --legacy-peer-deps

            echo "==> prisma generate (safe no-op if not used)"
            npx prisma generate || true

            echo "==> next build"
            npm run build

            echo "==> pm2 restart saadstudio"
            pm2 restart saadstudio --update-env
            pm2 save

            echo "==> deploy done: $(git rev-parse --short HEAD)"
