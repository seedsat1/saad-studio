<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAAD STUDIO — Photo With Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090f;--bg2:#0d0f18;--bg-card:#111320;--bg-card-h:#171a2c;
  --electric:#4de1ff;--electric-g:rgba(77,225,255,.1);
  --violet:#a78bfa;--violet-g:rgba(167,139,250,.1);
  --amber:#f59e0b;--amber-g:rgba(245,158,11,.1);
  --emerald:#34d399;--emerald-g:rgba(52,211,153,.1);
  --pink:#f472b6;--pink-g:rgba(244,114,182,.1);
  --orange:#fb923c;--orange-g:rgba(251,146,60,.1);
  --red:#f87171;--red-g:rgba(248,113,113,.1);
  --txt:#e8ecf4;--txt2:#8490a8;--txt3:#525d75;
  --brd:rgba(255,255,255,.06);--brd-h:rgba(77,225,255,.25);
  --r:16px;--rs:10px;
  --far:'Cairo',sans-serif;--fen:'Space Grotesk',sans-serif;--fh:'Syne',sans-serif;
  --ease:all .35s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--far);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.amb{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 500px 400px at 25% 15%,rgba(77,225,255,.04),transparent),
  radial-gradient(ellipse 600px 500px at 75% 75%,rgba(167,139,250,.03),transparent),
  radial-gradient(ellipse 400px 300px at 50% 50%,rgba(52,211,153,.02),transparent)}

/* HEADER */
.hdr{position:relative;z-index:2;padding:48px 40px 14px;text-align:center}
.hdr .st{font-family:var(--fen);font-size:.72rem;text-transform:uppercase;letter-spacing:6px;color:var(--electric);margin-bottom:14px;font-weight:600}
.hdr h1{font-family:var(--fh);font-size:clamp(2rem,5vw,3.4rem);font-weight:800;
  background:linear-gradient(135deg,var(--electric),#fff 40%,var(--violet) 70%,var(--electric));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;letter-spacing:-1px}
.hdr p{font-size:.95rem;color:var(--txt2);max-width:540px;margin:0 auto;line-height:1.8}

/* TABS */
.tabs{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:7px;padding:24px 16px 28px;flex-wrap:wrap}
.tab{font-family:var(--far);padding:9px 22px;border-radius:100px;border:1.5px solid var(--brd);background:transparent;color:var(--txt2);font-size:.82rem;font-weight:700;cursor:pointer;transition:var(--ease);display:flex;align-items:center;gap:7px}
.tab .cnt{font-family:var(--fen);font-size:.65rem;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.05);color:var(--txt3);transition:var(--ease)}
.tab:hover{border-color:var(--electric);color:var(--electric)}
.tab.on{border-color:var(--electric);color:var(--electric);background:var(--electric-g);box-shadow:0 0 20px rgba(77,225,255,.08)}
.tab.on .cnt{background:rgba(77,225,255,.2);color:var(--electric)}
/* colored tabs */
.tab[data-c="celeb"].on{border-color:var(--amber);color:var(--amber);background:var(--amber-g)}.tab[data-c="celeb"].on .cnt{background:rgba(245,158,11,.2);color:var(--amber)}
.tab[data-c="cartoon"].on{border-color:var(--violet);color:var(--violet);background:var(--violet-g)}.tab[data-c="cartoon"].on .cnt{background:rgba(167,139,250,.2);color:var(--violet)}
.tab[data-c="animal"].on{border-color:var(--emerald);color:var(--emerald);background:var(--emerald-g)}.tab[data-c="animal"].on .cnt{background:rgba(52,211,153,.2);color:var(--emerald)}
.tab[data-c="place"].on{border-color:var(--electric);color:var(--electric);background:var(--electric-g)}.tab[data-c="place"].on .cnt{background:rgba(77,225,255,.2);color:var(--electric)}
.tab[data-c="time"].on{border-color:var(--orange);color:var(--orange);background:var(--orange-g)}.tab[data-c="time"].on .cnt{background:rgba(251,146,60,.2);color:var(--orange)}
.tab[data-c="clone"].on{border-color:var(--pink);color:var(--pink);background:var(--pink-g)}.tab[data-c="clone"].on .cnt{background:rgba(244,114,182,.2);color:var(--pink)}
.tab[data-c="funny"].on{border-color:var(--red);color:var(--red);background:var(--red-g)}.tab[data-c="funny"].on .cnt{background:rgba(248,113,113,.2);color:var(--red)}

/* GRID */
.gw{position:relative;z-index:2;max-width:1440px;margin:0 auto;padding:0 24px 80px}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}

/* CARD */
.cd{position:relative;background:var(--bg-card);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:var(--ease);animation:cI .5s ease both}
@keyframes cI{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.cd:hover{border-color:var(--brd-h);transform:translateY(-5px);box-shadow:0 16px 44px rgba(0,0,0,.45),0 0 24px rgba(77,225,255,.06)}
.cd .th{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.cd .th .ph{font-family:var(--fen);font-size:.7rem;color:var(--txt3);text-align:center;padding:12px;line-height:1.5}
.cd .th .ovl{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg-card) 0%,transparent 40%)}
.cd .th img{width:100%;height:100%;object-fit:cover}
.cd .bd{position:absolute;top:10px;left:10px;padding:3px 10px;border-radius:100px;font-family:var(--fen);font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;z-index:2}
.bh{background:var(--red);color:#fff}.bn{background:var(--emerald);color:var(--bg)}.bp{background:var(--amber);color:var(--bg)}.bv{background:var(--violet);color:#fff}
.cd .oc{position:absolute;top:10px;right:10px;padding:3px 10px;border-radius:100px;font-family:var(--fen);font-size:.6rem;font-weight:600;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:var(--txt2);z-index:2}
.cd .inf{padding:14px 16px 16px}
.cd .inf h3{font-family:var(--fh);font-size:1rem;font-weight:700;margin-bottom:3px;color:var(--txt);transition:color .3s;letter-spacing:-.3px}
.cd:hover .inf h3{color:var(--electric)}
.cd .inf .ds{font-size:.76rem;color:var(--txt2);line-height:1.6}

/* WORKSPACE */
.wo{position:fixed;inset:0;z-index:1000;background:rgba(5,6,12,.95);backdrop-filter:blur(24px);opacity:0;visibility:hidden;transition:all .4s ease;overflow-y:auto}
.wo.on{opacity:1;visibility:visible}
.ws{max-width:860px;margin:0 auto;padding:36px 28px 80px;transform:translateY(30px);transition:transform .4s cubic-bezier(.4,0,.2,1)}
.wo.on .ws{transform:translateY(0)}
.wb{display:inline-flex;align-items:center;gap:8px;font-family:var(--far);font-size:.88rem;color:var(--txt2);cursor:pointer;background:none;border:none;padding:8px 0;margin-bottom:20px;transition:color .3s}
.wb:hover{color:var(--electric)}
.wb svg{width:18px;height:18px;transform:scaleX(-1)}
.wh{text-align:center;margin-bottom:28px}
.wh h2{font-family:var(--fh);font-size:1.8rem;font-weight:800;margin-bottom:8px;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--electric),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wh p{color:var(--txt2);font-size:.88rem;line-height:1.7;max-width:500px;margin:0 auto}

/* STEPS */
.steps{display:flex;align-items:center;justify-content:center;gap:28px;margin-bottom:30px}
.step{display:flex;align-items:center;gap:7px;font-family:var(--fen);font-size:.78rem;color:var(--txt3);font-weight:600}
.step .sn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;border:1.5px solid var(--brd);color:var(--txt3);transition:var(--ease)}
.step.ac .sn{border-color:var(--electric);color:var(--bg);background:var(--electric)}.step.ac{color:var(--electric)}
.step.dn .sn{border-color:var(--emerald);color:var(--bg);background:var(--emerald)}.step.dn{color:var(--emerald)}
.steps .ln{width:36px;height:1px;background:var(--brd)}

.sl{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--txt);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--brd);letter-spacing:-.3px}

/* UPLOAD */
.uz{position:relative;border:2px dashed rgba(77,225,255,.12);border-radius:var(--r);padding:40px 20px;text-align:center;cursor:pointer;transition:var(--ease);background:rgba(77,225,255,.02);min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;margin-bottom:26px}
.uz:hover{border-color:rgba(77,225,255,.4);background:var(--electric-g)}
.uz.hf{border-color:var(--emerald);border-style:solid;background:rgba(52,211,153,.04)}
.uz svg{width:40px;height:40px;stroke:var(--txt3);fill:none;stroke-width:1.5}
.uz .ut{font-size:.85rem;color:var(--txt3)}.uz .ut strong{color:var(--electric)}
.uz .ux{font-size:.7rem;color:var(--txt3)}
.uz input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.uz .pi{max-width:100%;max-height:200px;border-radius:var(--rs);object-fit:contain;display:none}
.uz.hf svg,.uz.hf .ut,.uz.hf .ux{display:none}.uz.hf .pi{display:block}

/* OPTIONS GRID */
.og{display:grid;gap:11px;margin-bottom:26px}
.og.c3{grid-template-columns:repeat(3,1fr)}
.og.c4{grid-template-columns:repeat(4,1fr)}
.og.c5{grid-template-columns:repeat(5,1fr)}
.oc2{position:relative;border:2px solid var(--brd);border-radius:var(--rs);overflow:hidden;cursor:pointer;transition:var(--ease);background:var(--bg2)}
.oc2:hover{border-color:rgba(77,225,255,.2)}
.oc2.sel{border-color:var(--electric);box-shadow:0 0 18px rgba(77,225,255,.12)}
.oc2 input[type="radio"]{position:absolute;opacity:0;pointer-events:none}
.oc2 .oi{width:100%;aspect-ratio:3/4;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.oc2 .oi img{width:100%;height:100%;object-fit:cover}
.oc2 .oi .op{font-family:var(--fen);font-size:.55rem;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);text-align:center;padding:8px;line-height:1.5}
.oc2 .ol2{padding:7px 8px;text-align:center;border-top:1px solid var(--brd)}
.oc2 .ol2 .on2{font-family:var(--fen);font-size:.74rem;font-weight:700;color:var(--txt);transition:color .3s}
.oc2.sel .ol2 .on2{color:var(--electric)}
.oc2 .ol2 .od2{font-size:.6rem;color:var(--txt3);line-height:1.3;margin-top:1px}
.oc2 .chk{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:50%;background:var(--electric);display:none;align-items:center;justify-content:center;z-index:2}
.oc2 .chk svg{width:11px;height:11px;fill:#fff;stroke:none}
.oc2.sel .chk{display:flex}

/* GENERATE */
.gb{width:100%;padding:15px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--electric),#0099cc);color:var(--bg);font-family:var(--fen);font-size:1.05rem;font-weight:700;cursor:pointer;transition:var(--ease);display:flex;align-items:center;justify-content:center;gap:10px}
.gb:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(77,225,255,.2)}
.gb:active{transform:translateY(0)}
.gb:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.gb svg{width:20px;height:20px}
.ra{margin-top:26px;display:none}.ra.vi{display:block}
.rl{text-align:center;padding:50px 20px;background:var(--bg-card);border-radius:var(--r);border:1px solid var(--brd)}
.sp{width:44px;height:44px;border-radius:50%;border:3px solid var(--brd);border-top-color:var(--electric);animation:sn 1s linear infinite;margin:0 auto 14px}
@keyframes sn{to{transform:rotate(360deg)}}
.rl p{color:var(--txt2);font-size:.88rem}
.ro{background:var(--bg-card);border-radius:var(--r);border:1px solid var(--brd);padding:20px;text-align:center}
.rx{display:flex;gap:10px;justify-content:center;margin-top:14px}
.rb{padding:10px 24px;border-radius:100px;font-family:var(--far);font-size:.82rem;font-weight:600;cursor:pointer;transition:var(--ease)}
.rdl{background:var(--electric);color:var(--bg);border:none}.rdl:hover{box-shadow:0 4px 18px rgba(77,225,255,.3)}
.rrt{background:transparent;color:var(--txt2);border:1.5px solid var(--brd)}.rrt:hover{border-color:var(--electric);color:var(--electric)}

@media(max-width:768px){.hdr{padding:32px 16px 8px}.hdr h1{font-size:1.6rem}.tabs{padding:16px 12px 20px;gap:6px}.gw{padding:0 12px 60px}.g{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}.ws{padding:16px 14px 60px}.og.c5,.og.c4{grid-template-columns:repeat(3,1fr)}.og.c3{grid-template-columns:repeat(2,1fr)}.steps{gap:14px}.steps .ln{width:16px}}
@media(max-width:480px){.og.c5,.og.c4,.og.c3{grid-template-columns:repeat(2,1fr)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(77,225,255,.1);border-radius:3px}
</style>
</head>

// STATE
let aC='all';
const cats=[
  {id:'all',l:'الكل'},{id:'celeb',l:'مشاهير'},{id:'cartoon',l:'كارتون'},
  {id:'animal',l:'حيوانات'},{id:'place',l:'أماكن مستحيلة'},
  {id:'time',l:'عبر الزمن'},{id:'clone',l:'نسخة منك'},{id:'funny',l:'مواقف طريفة'}
];
const cF=c=>c==='all'?T.length:T.filter(t=>t.cat===c).length;

const $t=document.getElementById('tabs'),$g=document.getElementById('gd');

function rTabs(){
  $t.innerHTML=cats.map(c=>`<button class="tab ${aC===c.id?'on':''}" data-c="${c.id}">${c.l}<span class="cnt">${cF(c.id)}</span></button>`).join('');
  $t.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{aC=b.dataset.c;rTabs();rGrid()});
}
function rGrid(){
  let l=aC==='all'?T:T.filter(t=>t.cat===aC);
  $g.innerHTML='';
  l.forEach((t,i)=>{
    const e=document.createElement('div');e.className='cd';
    e.style.animationDelay=`${i*.025}s`;e.onclick=()=>openWS(t);
    const bc=t.b==='hot'?'bh':t.b==='new'?'bn':t.b==='pop'?'bp':'bv';
    const bl=t.b==='hot'?'HOT':t.b==='new'?'NEW':'POPULAR';
    e.innerHTML=`<div class="th"><div class="ph">${t.d}</div><div class="ovl"></div><span class="bd ${bc}">${bl}</span><span class="oc">${t.opts.length} خيارات</span></div><div class="inf"><h3>${t.n}</h3><p class="ds">${t.d}</p></div>`;
    $g.appendChild(e);
  });
}
rTabs();rGrid();

// WORKSPACE
const $o=document.getElementById('wO'),$w=document.getElementById('wS');
let uFile=null,sOpt=null;

function openWS(t){
  uFile=null;sOpt=null;
  const cc=`c${t.cols||4}`;
  const oH=t.opts.map(o=>{
    const ic=o.img?`<img src="${o.img}" alt="${o.n}">`:`<div class="op">${o.ar}<br><span style="font-size:.45rem;opacity:.4">صورة قريباً</span></div>`;
    return`<div class="oc2" data-id="${o.id}" onclick="sO(this,'${o.id}')"><input type="radio" name="opt" value="${o.id}"><div class="chk"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><div class="oi">${ic}</div><div class="ol2"><div class="on2">${o.n}</div><div class="od2">${o.d}</div></div></div>`;
  }).join('');

  $w.innerHTML=`
    <button class="wb" onclick="cWS()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>رجوع</button>
    <div class="wh"><h2>${t.n}</h2><p>${t.d}</p></div>
    <div class="steps"><div class="step ac" id="s1"><span class="sn">1</span>ارفع صورتك</div><div class="ln"></div><div class="step" id="s2"><span class="sn">2</span>اختر المشهد</div><div class="ln"></div><div class="step" id="s3"><span class="sn">3</span>النتيجة</div></div>
    <div class="sl">الخطوة 1 — ارفع صورتك</div>
    <div class="uz" id="upZ" onclick="this.querySelector('input').click()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><div class="ut"><strong>اضغط لرفع صورتك</strong></div><div class="ux">JPG, PNG, WEBP</div><img class="pi" alt=""><input type="file" accept="image/*" onchange="hUp(this)"></div>
    <div class="sl">الخطوة 2 — اختر المشهد</div>
    <div class="og ${cc}" id="opG">${oH}</div>
    <button class="gb" id="gB" onclick="dG('${t.id}')" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>Generate — إنشاء</button>
    <div class="ra" id="rA"><div class="rl" id="rL"><div class="sp"></div><p>جاري إنشاء المشهد...</p></div><div class="ro" id="rO" style="display:none"></div></div>`;
  $o.classList.add('on');document.body.style.overflow='hidden';$o.scrollTop=0;
}
function cWS(){$o.classList.remove('on');document.body.style.overflow=''}
$o.addEventListener('click',e=>{if(e.target===$o)cWS()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')cWS()});

function hUp(inp){
  const f=inp.files[0];if(!f)return;uFile=f;
  const z=document.getElementById('upZ');z.classList.add('hf');
  z.querySelector('.pi').src=URL.createObjectURL(f);z.querySelector('.pi').style.display='block';
  document.getElementById('s1').className='step dn';
  document.getElementById('s2').className='step ac';
  chk();
}
function sO(c,id){
  document.querySelectorAll('.oc2').forEach(x=>x.classList.remove('sel'));
  c.classList.add('sel');c.querySelector('input').checked=true;sOpt=id;chk();
}
function chk(){document.getElementById('gB').disabled=!(uFile&&sOpt)}

async function dG(tid){
  if(!uFile||!sOpt)return;
  const template=T.find(x=>x.id===tid);
  const option=template?.opts?.find(x=>x.id===sOpt);
  const b=document.getElementById('gB'),ra=document.getElementById('rA'),rl=document.getElementById('rL'),ro=document.getElementById('rO');
  b.disabled=true;b.innerHTML=`<div class="sp" style="width:20px;height:20px;border-width:2px;margin:0"></div> جاري الإنشاء...`;
  ra.classList.add('vi');rl.style.display='block';ro.style.display='none';
  document.getElementById('s2').className='step dn';document.getElementById('s3').className='step ac';
  const status=(msg)=>{const p=rl.querySelector('p');if(p)p.textContent=msg;};
  try{
    const prompt=`حوّل الصورة المرفوعة إلى مشهد "${template?.n||tid}" مع تطبيق خيار "${option?.n||sOpt}". ${template?.d||''}. ${option?.d||''}. حافظ على ملامح الشخص والهوية والوجه بشكل واضح وواقعي. اجعل النتيجة عالية الجودة ومناسبة للنشر. ${option?.ar?`النسخة المطلوبة: ${option.ar}.`:''}`;
    const resultUrl=await SaadCreative.runSeedreamEdit({
      prompt,
      imageFiles:[uFile],
      statusCb:status
    });
    rl.style.display='none';ro.style.display='block';
    ro.innerHTML=`<div style="padding:20px 20px 12px;text-align:center"><div style="font-family:var(--fh);font-size:1.2rem;font-weight:700;color:var(--electric);margin-bottom:6px">تم الإنشاء بنجاح!</div></div><div style="padding:0 18px 18px"><img src="${resultUrl}" alt="result" style="width:100%;display:block;border-radius:22px;border:1px solid rgba(255,255,255,.08)"></div><div class="rx">${SaadCreative.buildDownload(resultUrl,'تحميل الصورة')}<button class="rb rrt" onclick="dG('${tid}')">إعادة</button></div>`;
  }catch(err){
    rl.style.display='none';ro.style.display='block';
    ro.innerHTML=`<div style="padding:36px;text-align:center"><div style="font-family:var(--fh);font-size:1.1rem;font-weight:700;color:#ff7b7b;margin-bottom:6px">تعذر إكمال الإنشاء</div><p style="color:var(--txt2);font-size:.8rem">${String(err.message||err)}</p></div><div class="rx"><button class="rb rrt" onclick="dG('${tid}')">إعادة المحاولة</button></div>`;
  }finally{
    b.disabled=false;b.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg> Generate — إنشاء`;
  }
}
</script>
