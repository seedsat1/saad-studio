<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Saad Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080c1a;
      color: #e8ecf8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .loader {
      width: 40px; height: 40px;
      border: 3px solid rgba(129, 140, 248, 0.2);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text { font-size: 14px; color: #6b7394; }
    .retry {
      margin-top: 20px; padding: 12px 24px;
      border-radius: 12px; border: none;
      background: #818cf8; color: #fff;
      font-size: 14px; font-weight: 600;
      cursor: pointer; display: none;
    }
  </style>
</head>
<body>
  <div class="loader" id="loader"></div>
  <div class="text" id="status">Loading Saad Studio...</div>
  <button class="retry" id="retryBtn" onclick="location.reload()">Retry</button>
  <script>
    // If the live URL doesn't load after 10 seconds, show retry
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('status').textContent = 'Connection issue. Check your internet.';
      document.getElementById('retryBtn').style.display = 'block';
    }, 10000);
  </script>
</body>
</html>
