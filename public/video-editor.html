<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAAD STUDIO - Video Project Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0a0a0a; --bg-deep:#050505; --card:#161616; --card-hover:#1e1e1e; --surface:#111111; --accent:#3b82f6; --accent-hover:#2563eb; --text:#e2e8f0; --text-dim:#94a3b8; --text-muted:#64748b; --border:rgba(255,255,255,0.08); --border-light:rgba(255,255,255,0.12); --green-audio:#22c55e; --purple-text:#8b5cf6; --timeline-bg:#0d0d0d; --track-bg:#1a1a1a; --playhead:#3b82f6; --selected:rgba(59,130,246,0.3); --danger:#ef4444; }
    *{box-sizing:border-box} body{margin:0;font-family:"Outfit",sans-serif;background:var(--bg-deep);color:var(--text)} button,input,select,textarea{font-family:inherit} .hidden{display:none!important}
    .app{height:100vh;display:flex;flex-direction:column;background:radial-gradient(circle at 25% 15%, rgba(59,130,246,0.06), transparent 35%), var(--bg)}
    .dashboard{padding:24px;overflow:auto;height:100%} .dashboard-card{border:1px solid var(--border);background:linear-gradient(135deg,#121212,#0d0d0d);border-radius:16px;padding:20px;margin-bottom:20px}
    .dashboard-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .btn{border:1px solid var(--border-light);background:#1b1b1b;color:var(--text);border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:600}.btn:hover{background:#242424}
    .btn-accent{background:linear-gradient(135deg,var(--accent),#1d4ed8);border-color:transparent;color:#fff}.btn-accent:hover{background:linear-gradient(135deg,var(--accent-hover),#1e40af)}
    .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-top:14px}
    .project-card{border:1px solid var(--border);background:#111;border-radius:12px;overflow:hidden;cursor:pointer}.project-thumb{height:108px;background:linear-gradient(145deg,#1c1c1c,#111);border-bottom:1px solid var(--border);position:relative}
    .mini-timeline{position:absolute;left:10px;right:10px;bottom:10px;height:34px;border:1px solid var(--border);border-radius:7px;background:#0d0d0d;overflow:hidden}
    .mini-clip{position:absolute;top:4px;height:10px;border-radius:4px;background:#2f2f2f}.mini-audio{position:absolute;top:18px;height:10px;border-radius:4px;background:rgba(34,197,94,0.5)}
    .project-body{padding:10px}.muted{color:var(--text-dim)}.small{font-size:12px}
    .editor{display:grid;grid-template-rows:56px minmax(0,1fr);height:100%}.topbar{border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#0b0b0b;gap:10px}
    .crumbs{display:flex;align-items:center;gap:8px;font-size:13px;min-width:0}.project-name{border:1px solid transparent;padding:4px 8px;border-radius:8px;min-width:120px;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text}.project-name:hover{border-color:var(--border);background:#141414}
    .cloud-status{color:#86efac;font-size:13px}.topbar-right{display:flex;align-items:center;gap:8px}
    .workspace{display:grid;grid-template-columns:230px minmax(0,1fr) 280px;min-height:0}.panel{border-right:1px solid var(--border);background:#0f0f0f;min-height:0;display:flex;flex-direction:column}.panel.right{border-right:none;border-left:1px solid var(--border)}
    .panel-header{border-bottom:1px solid var(--border);padding:10px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px;border-bottom:1px solid var(--border)}.tab{border:1px solid var(--border);background:#131313;color:var(--text-dim);padding:8px;border-radius:8px;text-align:center;cursor:pointer;font-size:12px}.tab.active{background:#1d1d1d;color:var(--text);border-color:var(--border-light)}
    .search{margin:10px;width:calc(100% - 20px);border:1px solid var(--border);background:#111;color:var(--text);border-radius:8px;padding:8px 10px;font-size:12px}
    .media-content{overflow:auto;padding:10px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.media-item{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#141414;cursor:grab}.media-item.selected{border-color:var(--accent);box-shadow:0 0 0 1px rgba(59,130,246,0.5) inset}
    .media-thumb{height:76px;background:linear-gradient(145deg,#242424,#111);display:flex;align-items:center;justify-content:center;color:#cbd5e1;font-size:11px;position:relative}.duration-badge{position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,0.65);border:1px solid var(--border);border-radius:6px;padding:1px 4px;font-size:10px}.media-name{font-size:11px;padding:6px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .center{display:grid;grid-template-rows:42px minmax(0,1fr) 230px;min-height:0;background:#0a0a0a}.toolbar{border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 10px;background:#0f0f0f}
    .tool-btn{border:1px solid var(--border);background:#161616;color:var(--text-dim);border-radius:8px;padding:6px 8px;font-size:12px}
    .preview-wrap{min-height:0;display:grid;grid-template-rows:minmax(0,1fr) 44px;padding:12px;gap:10px;border-bottom:1px solid var(--border)}
    .preview{border:1px solid var(--border);background:#000;border-radius:12px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;aspect-ratio:16/9;margin:0 auto;width:min(100%,980px)}
    .preview video,.preview img{width:100%;height:100%;object-fit:contain}.preview-text{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;pointer-events:none;white-space:pre-wrap;max-width:90%}.preview-empty{color:#64748b;font-size:14px;text-align:center}
    .playback{border:1px solid var(--border);border-radius:10px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;gap:8px;font-size:12px}.playback-left,.playback-right{display:flex;align-items:center;gap:8px}
    .timeline{min-height:0;display:grid;grid-template-rows:30px 1fr 32px;background:var(--timeline-bg)} .ruler{border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;overflow-x:auto;overflow-y:hidden;white-space:nowrap;background:#121212}
    .ruler-content{position:relative;height:100%;min-width:1200px}.ruler-mark{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.08)}.ruler-label{position:absolute;top:6px;left:2px;font-size:10px;color:var(--text-muted)}
    .tracks-wrap{overflow:auto;position:relative;padding:8px 10px}.track{position:relative;height:58px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--track-bg);min-width:1200px}.track-label{position:absolute;left:8px;top:8px;font-size:11px;color:var(--text-muted);z-index:2}
    .clip{position:absolute;top:22px;height:30px;border-radius:6px;border:2px solid transparent;background:#2a2a2a;overflow:hidden;cursor:grab;user-select:none;display:flex;align-items:center;padding:0 8px;font-size:11px;white-space:nowrap;gap:6px}.clip.video{background:#2b2b2b}.clip.text{background:rgba(139,92,246,0.35);border-left:3px solid var(--purple-text)}.clip.audio{background:rgba(34,197,94,0.22);border-left:3px solid var(--green-audio)}.clip.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--selected) inset}
    .trim-handle{position:absolute;top:0;width:6px;bottom:0;background:rgba(255,255,255,0.3);cursor:ew-resize;z-index:2}.trim-handle.left{left:0}.trim-handle.right{right:0}
    .playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--playhead);z-index:20;pointer-events:none}.playhead::before{content:"";position:absolute;top:-6px;left:-5px;width:12px;height:12px;background:var(--playhead);clip-path:polygon(0 0,100% 0,50% 100%)}
    .timeline-footer{border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-size:12px;color:var(--text-dim)} .zoom-wrap{display:flex;align-items:center;gap:8px}.zoom-input{width:140px;accent-color:var(--accent)} .selection-chip{border:1px solid var(--border);border-radius:999px;padding:4px 10px;background:#131313}
    .prop-body{overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px;min-height:0}.prop-section{border:1px solid var(--border);border-radius:10px;background:#131313;padding:10px}.prop-section h4{margin:0 0 8px;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em}
    .row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:6px;margin-bottom:6px;font-size:12px}.row input[type="range"]{width:100%;accent-color:var(--accent)}
    .row input[type="text"],.row input[type="number"],.row select,.row textarea{border:1px solid var(--border);background:#0f0f0f;color:var(--text);border-radius:8px;padding:6px 8px;width:100%;font-size:12px}
    .chip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.chip{border:1px solid var(--border);background:#171717;border-radius:8px;padding:6px 8px;text-align:center;cursor:pointer;font-size:11px}.chip.active{border-color:var(--accent);background:rgba(59,130,246,0.14);color:#bfdbfe}
    .selection-bar{border-top:1px solid var(--border);padding:8px 10px;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;background:#101010}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:12px}.modal-card{width:min(460px,100%);border:1px solid var(--border-light);background:#111;border-radius:14px;padding:14px}.modal-row{margin-bottom:10px}
    @media (max-width:1280px){.workspace{grid-template-columns:220px minmax(0,1fr)}.panel.right{display:none}} @media (max-width:980px){.workspace{grid-template-columns:1fr}.panel.left{display:none}.center{grid-template-rows:42px minmax(0,1fr) 270px}}
  </style>
</head>
<body>
  <div class="app">
    <section id="dashboardView" class="dashboard"></section>
    <section id="editorView" class="editor hidden">
      <header class="topbar">
        <div class="crumbs">
          <button id="backBtn" class="btn">← سعد</button>
          <span class="muted">/ Video Project Editor /</span>
          <div id="projectName" class="project-name" contenteditable="true">Untitled Project</div>
          <span id="saveStatusIcon" class="cloud-status">☁</span>
        </div>
        <div class="topbar-right">
          <button id="saveBtn" class="btn">Save</button>
          <button id="exportBtn" class="btn btn-accent">Export</button>
        </div>
      </header>
      <div class="workspace">
        <aside class="panel left">
          <div class="panel-header"><span>Add media</span><button id="uploadBtn" class="btn small">Upload</button></div>
          <div class="tabs" id="mediaTabs"></div>
          <input id="mediaSearch" class="search" placeholder="Search media" />
          <div id="mediaContent" class="media-content"></div>
          <div class="selection-bar"><span id="mediaSelectedText">0 items selected</span><button id="addToTimelineBtn" class="btn btn-accent">Add to timeline</button></div>
          <input id="uploadInput" type="file" multiple class="hidden" accept="video/*,image/*,audio/*" />
        </aside>
        <main class="center">
          <div class="toolbar" id="topTools"></div>
          <div class="preview-wrap">
            <div class="preview" id="previewCanvas"></div>
            <div class="playback"><div class="playback-left"><button id="playBtn" class="btn">▶</button><span id="timeCode">00:00:00 / 00:00:00</span><button id="loopBtn" class="btn">Loop: Off</button></div><div class="playback-right"><button id="undoBtn" class="btn">Undo</button><button id="redoBtn" class="btn">Redo</button></div></div>
          </div>
          <div class="timeline">
            <div id="ruler" class="ruler"><div id="rulerContent" class="ruler-content"></div></div>
            <div id="tracksWrap" class="tracks-wrap">
              <div class="track" data-track="video"><div class="track-label">🎬 Video</div></div>
              <div class="track" data-track="text"><div class="track-label">📝 Text</div></div>
              <div class="track" data-track="audio"><div class="track-label">🔊 Audio</div></div>
              <div id="playhead" class="playhead"></div>
            </div>
            <div class="timeline-footer"><div class="selection-chip" id="selectionText">0 items selected</div><div class="zoom-wrap"><span>🔍</span><input id="zoomInput" class="zoom-input" type="range" min="20" max="160" value="55" /><span id="zoomValue">55 px/s</span></div></div>
          </div>
        </main>
        <aside class="panel right"><div class="panel-header"><span>Properties</span><span id="propType">None</span></div><div id="propBody" class="prop-body"></div></aside>
      </div>
    </section>
  </div>
  <div id="exportModal" class="modal hidden">
    <div class="modal-card">
      <div class="dashboard-row" style="margin-bottom:12px"><h3 style="margin:0">Export Video</h3><button id="closeExportBtn" class="btn">✕</button></div>
      <div class="modal-row"><label>Format</label><div class="chip-grid" id="exportFormat"></div></div>
      <div class="modal-row"><label>Resolution</label><div class="chip-grid" id="exportResolution"></div></div>
      <div class="modal-row"><label>Quality</label><div class="chip-grid" id="exportQuality"></div></div>
      <div class="modal-row"><label>Frame Rate</label><div class="chip-grid" id="exportFps"></div></div>
      <p class="small muted" id="exportEstimate">Estimated file size: ~25MB • Estimated time: ~30s</p>
      <div class="dashboard-row"><button id="cancelExportBtn" class="btn">Cancel</button><button id="doExportBtn" class="btn btn-accent">Export Video</button></div>
    </div>
  </div>
  <script>
    const STORAGE_KEY = "saad_video_projects_v1";
    const HISTORY_LIMIT = 80;

    const textTemplates = [
      { id: "simple-title", name: "Simple Title", content: "Title Text Here", style: { fontSize: 48, fontWeight: 700, color: "#ffffff", textAlign: "center", fontFamily: "Outfit" } },
      { id: "subtitle-combo", name: "Title + Subtitle", content: "SAMPLE TEXT\nSUB HEADING", style: { fontSize: 34, fontWeight: 700, color: "#ffffff", textAlign: "center", fontFamily: "Outfit" } },
      { id: "film-title", name: "Film Title", content: "FILM TITLE", style: { fontSize: 56, fontWeight: 900, color: "#ffffff", textAlign: "center", fontFamily: "serif" } },
      { id: "bold-accent", name: "Bold Accent", content: "TITLE TEXT HERE", style: { fontSize: 42, fontWeight: 800, color: "#ef4444", textAlign: "center", fontFamily: "Outfit" } },
      { id: "minimal-clean", name: "Minimal Clean", content: "Text Text Here", style: { fontSize: 32, fontWeight: 300, color: "#ffffff", textAlign: "center", fontFamily: "Outfit" } },
      { id: "showreel", name: "Showreel", content: "TITLE\nSHOWREEL", style: { fontSize: 35, fontWeight: 700, color: "#06b6d4", textAlign: "center", fontFamily: "Outfit" } },
      { id: "heading-sub", name: "Heading + Sub", content: "SUB HEADING\nSample Text", style: { fontSize: 34, fontWeight: 700, color: "#ec4899", textAlign: "center", fontFamily: "Outfit" } },
      { id: "name-card", name: "Name Card", content: "YUSSEF\nPALLADINO", style: { fontSize: 36, fontWeight: 600, color: "#ffffff", textAlign: "center", fontFamily: "Outfit" } },
      { id: "cinematic-intro", name: "Cinematic Intro", content: "THE BEST\nDAY OF YOUR LIFE", style: { fontSize: 26, fontWeight: 500, color: "#ffffff", textAlign: "center", fontFamily: "Outfit" } },
      { id: "accent-bar", name: "Accent Bar", content: "YOUR TITLE\nHERE", style: { fontSize: 32, fontWeight: 700, color: "#ffffff", textAlign: "center", fontFamily: "Outfit" } },
      { id: "welcome-banner", name: "Welcome Banner", content: "WELCOME\nTO THE HILLS", style: { fontSize: 30, fontWeight: 700, color: "#ffffff", textAlign: "center", fontFamily: "Outfit" } },
      { id: "lower-third", name: "Lower Third", content: "Lower Third Title", style: { fontSize: 22, fontWeight: 600, color: "#ffffff", textAlign: "left", fontFamily: "Outfit" } },
      { id: "lower-third-accent", name: "Lower Third Accent", content: "Lower Third Title", style: { fontSize: 22, fontWeight: 600, color: "#06b6d4", textAlign: "left", fontFamily: "Outfit" } },
      { id: "caption-box", name: "Caption Box", content: "SAMPLE TEXT\nSUB HEADING", style: { fontSize: 24, fontWeight: 500, color: "#ffffff", textAlign: "center", fontFamily: "Outfit" } },
      { id: "gradient-title", name: "Gradient Title", content: "SAMPLE\nTEXT", style: { fontSize: 44, fontWeight: 800, color: "#ffffff", textAlign: "center", fontFamily: "Outfit" } },
    ];

    const defaultMedia = {
      videos: [
        { id: "v1", type: "video", name: "City Night Drive.mp4", duration: 3.9, color: "#2a2a2a", src: "" },
        { id: "v2", type: "video", name: "Portrait Scene.mp4", duration: 5.1, color: "#323232", src: "" },
        { id: "v3", type: "video", name: "Sky Drone.mp4", duration: 4.4, color: "#252525", src: "" },
        { id: "v4", type: "video", name: "Street Walk.mp4", duration: 2.8, color: "#292929", src: "" },
      ],
      images: [
        { id: "i1", type: "image", name: "Hero Poster.png", duration: 3.0, color: "#313131", src: "" },
        { id: "i2", type: "image", name: "Product Shot.jpg", duration: 3.0, color: "#2f2f2f", src: "" },
        { id: "i3", type: "image", name: "Landscape.jpg", duration: 3.0, color: "#343434", src: "" },
      ],
      audio: [
        { id: "a1", type: "audio", name: "Voiceover Intro.wav", duration: 8.2, src: "" },
        { id: "a2", type: "audio", name: "Background Loop.mp3", duration: 14.6, src: "" },
        { id: "a3", type: "audio", name: "SFX Impact.wav", duration: 1.5, src: "" },
      ],
      text: textTemplates.map((t) => ({ id: t.id, type: "text", name: t.name, template: t })),
    };

    let projects = loadProjects();
    let currentProject = null;
    let activeMediaTab = "videos";
    let mediaSearch = "";
    let selectedMedia = [];
    let selectedClips = new Set();
    let zoomLevel = 55;
    let playheadTime = 0;
    let isPlaying = false;
    let isLoop = false;
    let playbackReq = null;
    let lastTick = 0;
    let historyStack = [];
    let historyIndex = -1;
    let saveDirty = false;
    let exportSettings = { format: "MP4", resolution: "1080p", quality: "High", fps: "30fps" };

    const dashboardView = document.getElementById("dashboardView");
    const editorView = document.getElementById("editorView");
    const mediaTabs = document.getElementById("mediaTabs");
    const mediaSearchInput = document.getElementById("mediaSearch");
    const mediaContent = document.getElementById("mediaContent");
    const addToTimelineBtn = document.getElementById("addToTimelineBtn");
    const mediaSelectedText = document.getElementById("mediaSelectedText");
    const tracksWrap = document.getElementById("tracksWrap");
    const rulerContent = document.getElementById("rulerContent");
    const playheadEl = document.getElementById("playhead");
    const selectionText = document.getElementById("selectionText");
    const propBody = document.getElementById("propBody");
    const propType = document.getElementById("propType");
    const projectNameEl = document.getElementById("projectName");
    const saveStatusIcon = document.getElementById("saveStatusIcon");
    const timeCode = document.getElementById("timeCode");
    const zoomInput = document.getElementById("zoomInput");
    const zoomValue = document.getElementById("zoomValue");
    const previewCanvas = document.getElementById("previewCanvas");
    const topTools = document.getElementById("topTools");
    const exportModal = document.getElementById("exportModal");

    document.getElementById("backBtn").addEventListener("click", () => { stopPlayback(); editorView.classList.add("hidden"); dashboardView.classList.remove("hidden"); renderDashboard(); });
    document.getElementById("saveBtn").addEventListener("click", () => saveProject());
    document.getElementById("exportBtn").addEventListener("click", () => openExportModal());
    document.getElementById("playBtn").addEventListener("click", () => togglePlayback());
    document.getElementById("loopBtn").addEventListener("click", () => { isLoop = !isLoop; document.getElementById("loopBtn").textContent = `Loop: ${isLoop ? "On" : "Off"}`; });
    document.getElementById("undoBtn").addEventListener("click", () => undo());
    document.getElementById("redoBtn").addEventListener("click", () => redo());
    document.getElementById("uploadBtn").addEventListener("click", () => document.getElementById("uploadInput").click());
    document.getElementById("uploadInput").addEventListener("change", handleUploadFiles);
    mediaSearchInput.addEventListener("input", (e) => { mediaSearch = e.target.value.trim().toLowerCase(); renderMediaPanel(); });
    addToTimelineBtn.addEventListener("click", () => { selectedMedia.forEach((item) => addMediaItemToTimeline(item, "video", findTimelineEnd("video"))); selectedMedia = []; renderMediaPanel(); renderAll(); });
    zoomInput.addEventListener("input", (e) => { zoomLevel = Number(e.target.value); zoomValue.textContent = `${zoomLevel} px/s`; renderTimeline(); });
    projectNameEl.addEventListener("input", () => { if (!currentProject) return; currentProject.name = projectNameEl.textContent.trim() || "Untitled Project"; markDirty(); });

    document.addEventListener("keydown", (e) => {
      if (dashboardView.classList.contains("hidden")) {
        if (e.code === "Space") { if (["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) return; e.preventDefault(); togglePlayback(); }
        if (e.key === "Delete") removeSelectedClips();
        if (e.key.toLowerCase() === "s") { if (e.ctrlKey || e.metaKey) { e.preventDefault(); saveProject(); return; } splitSelectedClipAtPlayhead(); }
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z") { e.preventDefault(); if (e.shiftKey) redo(); else undo(); }
      }
    });

    document.getElementById("closeExportBtn").addEventListener("click", closeExportModal);
    document.getElementById("cancelExportBtn").addEventListener("click", closeExportModal);
    document.getElementById("doExportBtn").addEventListener("click", () => { closeExportModal(); alert("Export started. (Simulated)"); });

    function loadProjects() { try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return []; return JSON.parse(raw); } catch (err) { return []; } }
    function persistProjects() { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); }
    function createProject() {
      const id = `proj_${Date.now()}`;
      const project = { id, name: "Untitled Project", createdAt: Date.now(), updatedAt: Date.now(), resolution: { width: 1920, height: 1080 }, fps: 30, tracks: { video: [], text: [], audio: [] }, media: JSON.parse(JSON.stringify(defaultMedia)) };
      projects.unshift(project); persistProjects(); openProject(id);
    }
    function openProject(id) {
      currentProject = projects.find((p) => p.id === id); if (!currentProject) return;
      selectedMedia = []; selectedClips = new Set(); playheadTime = 0; isLoop = false;
      document.getElementById("loopBtn").textContent = "Loop: Off"; mediaSearch = ""; mediaSearchInput.value = "";
      dashboardView.classList.add("hidden"); editorView.classList.remove("hidden"); projectNameEl.textContent = currentProject.name; initHistory(); renderAll(); setSavedIcon();
    }

        e.preventDefault();
        const raw = e.dataTransfer.getData("application/json"); if (!raw) return;
        const media = JSON.parse(raw); const trackEl = e.target.closest(".track"); if (!trackEl) return;
        const track = trackEl.dataset.track; const rect = trackEl.getBoundingClientRect(); const x = e.clientX - rect.left; const insertTime = Math.max(0, x / zoomLevel);
        addMediaItemToTimeline(media, track, insertTime); renderAll();
      });
      rulerContent.parentElement.addEventListener("click", (e) => { const rect = rulerContent.getBoundingClientRect(); const x = e.clientX - rect.left; setPlayheadPosition(x / zoomLevel); });
      tracksWrap.addEventListener("wheel", (e) => { if (!e.ctrlKey) return; e.preventDefault(); zoomLevel = Math.max(20, Math.min(160, zoomLevel + (e.deltaY < 0 ? 4 : -4))); zoomInput.value = String(zoomLevel); zoomValue.textContent = `${zoomLevel} px/s`; renderTimeline(); }, { passive: false });
      tracksWrap.addEventListener("contextmenu", (e) => {
        const clipEl = e.target.closest(".clip"); if (!clipEl) return; e.preventDefault();
        const clipId = clipEl.dataset.clip; selectedClips = new Set([clipId]); renderTimeline(); renderProperties();
        const choice = prompt("Clip action: type duplicate or delete", "duplicate");
        if (choice === "duplicate") duplicateSelectedClip();
        if (choice === "delete") removeSelectedClips();
      });
    }

    function openExportModal() { exportModal.classList.remove("hidden"); renderExportChoices(); }
    function closeExportModal() { exportModal.classList.add("hidden"); }
    function renderChoiceGroup(containerId, values, key) {
      const el = document.getElementById(containerId);
      el.innerHTML = values.map((v) => `<button class="chip ${exportSettings[key] === v ? "active" : ""}" data-k="${key}" data-v="${v}">${v}</button>`).join("");
      [...el.querySelectorAll("[data-v]")].forEach((btn) => btn.addEventListener("click", () => { exportSettings[key] = btn.dataset.v; renderExportChoices(); }));
    }
    function renderExportChoices() {
      renderChoiceGroup("exportFormat", ["MP4", "WEBM"], "format");
      renderChoiceGroup("exportResolution", ["720p", "1080p", "2K", "4K"], "resolution");
      renderChoiceGroup("exportQuality", ["Standard", "High", "Maximum"], "quality");
      renderChoiceGroup("exportFps", ["24fps", "30fps", "60fps"], "fps");
      document.getElementById("exportEstimate").textContent = `Estimated file size: ~${estimateExportSize()}MB • Estimated time: ~${estimateExportTime()}s`;
    }
    function estimateExportSize() {
      const dur = getProjectDuration(currentProject);
      const resMul = { "720p": 1, "1080p": 1.7, "2K": 2.2, "4K": 3.8 }[exportSettings.resolution] || 1;
      const qualityMul = { Standard: 1, High: 1.3, Maximum: 1.7 }[exportSettings.quality] || 1;
      return Math.max(8, Math.round(dur * 1.2 * resMul * qualityMul));
    }
    function estimateExportTime() {
      const dur = getProjectDuration(currentProject);
      const fpsMul = { "24fps": 1, "30fps": 1.1, "60fps": 1.8 }[exportSettings.fps] || 1;
      return Math.max(8, Math.round(dur * 2.4 * fpsMul));
    }

    renderDashboard();
    initTimelineInteractions();
  </script>
</body>
</html>
