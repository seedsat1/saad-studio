<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <base href="/admin/">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta name="description" content="Saad Studio - Admin Dashboard">
    <title>Saad Studio — Dashboard</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="vendors/simplebar/css/simplebar.css">
    <link rel="stylesheet" href="css/vendors/simplebar.css">
    <link href="css/style.css" rel="stylesheet">
    <script src="js/config.js"></script>
    <script src="js/color-modes.js"></script>
    <style>
      .stat-card { transition: transform .15s ease; }
      .stat-card:hover { transform: translateY(-2px); }
      .stat-value { font-size: 2rem; font-weight: 700; }
      .stat-label { font-size: .85rem; opacity: .85; }
      .stat-icon { font-size: 2.5rem; opacity: .3; }
      .placeholder-glow .placeholder { border-radius: 4px; }
    </style>
  </head>
  <body>
    <!-- SIDEBAR -->
    <div class="sidebar sidebar-dark sidebar-fixed border-end" id="sidebar">
      <div class="sidebar-header border-bottom">
        <div class="sidebar-brand">
          <span class="sidebar-brand-full fw-semibold fs-5 text-white">Saad Studio</span>
          <span class="sidebar-brand-narrow fw-bold text-white">SS</span>
        </div>
        <button class="btn-close d-lg-none" type="button" data-coreui-theme="dark" aria-label="Close" onclick="coreui.Sidebar.getInstance(document.querySelector('#sidebar')).toggle()"></button>
      </div>
      <ul class="sidebar-nav" data-coreui="navigation" data-simplebar="">
        <li class="nav-item"><a class="nav-link active" href="index.html">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-speedometer"></use></svg> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="users.html">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-people"></use></svg> Users</a></li>
        <li class="nav-item"><a class="nav-link" href="orders.html">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-cart"></use></svg> Orders</a></li>
        <li class="nav-item"><a class="nav-link" href="#pages">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-file"></use></svg> Pages</a></li>
        <li class="nav-item"><a class="nav-link" href="media.html">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-image"></use></svg> Media</a></li>
        <li class="nav-item"><a class="nav-link" href="ads.html">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-bullhorn"></use></svg> Ads</a></li>
        <li class="nav-item"><a class="nav-link" href="#settings">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-settings"></use></svg> Settings</a></li>
      </ul>
      <div class="sidebar-footer border-top d-none d-md-flex">
        <button class="sidebar-toggler" type="button" data-coreui-toggle="unfoldable"></button>
      </div>
    </div>

    <!-- MAIN WRAPPER -->
    <div class="wrapper d-flex flex-column min-vh-100">
      <!-- Header -->
      <header class="header header-sticky p-0 mb-4">
        <div class="container-fluid border-bottom px-4">
          <button class="header-toggler" type="button" onclick="coreui.Sidebar.getInstance(document.querySelector('#sidebar')).toggle()" style="margin-inline-start: -14px;">
            <svg class="icon icon-lg"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-menu"></use></svg>
          </button>
          <ul class="header-nav d-none d-lg-flex">
            <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          </ul>
          <ul class="header-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#">
                <svg class="icon icon-lg"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-bell"></use></svg></a></li>
          </ul>
          <ul class="header-nav">
            <li class="nav-item py-1"><div class="vr h-100 mx-2 text-body text-opacity-75"></div></li>
            <li class="nav-item dropdown">
              <button class="btn btn-link nav-link py-2 px-2 d-flex align-items-center" type="button" aria-expanded="false" data-coreui-toggle="dropdown">
                <svg class="icon icon-lg theme-icon-active"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-contrast"></use></svg>
              </button>
              <ul class="dropdown-menu dropdown-menu-end" style="--cui-dropdown-min-width: 8rem;">
                <li><button class="dropdown-item d-flex align-items-center" type="button" data-coreui-theme-value="light">
                    <svg class="icon icon-lg me-3"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-sun"></use></svg>Light</button></li>
                <li><button class="dropdown-item d-flex align-items-center" type="button" data-coreui-theme-value="dark">
                    <svg class="icon icon-lg me-3"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-moon"></use></svg>Dark</button></li>
                <li><button class="dropdown-item d-flex align-items-center active" type="button" data-coreui-theme-value="auto">
                    <svg class="icon icon-lg me-3"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-contrast"></use></svg>Auto</button></li>
              </ul>
            </li>
            <li class="nav-item py-1"><div class="vr h-100 mx-2 text-body text-opacity-75"></div></li>
            <li class="nav-item dropdown"><a class="nav-link py-0 pe-0" data-coreui-toggle="dropdown" href="#" role="button" aria-haspopup="true" aria-expanded="false">
                <div class="avatar avatar-md bg-primary text-white d-flex align-items-center justify-content-center rounded-circle" style="width:36px;height:36px;font-size:14px;">A</div></a>
              <div class="dropdown-menu dropdown-menu-end pt-0">
                <div class="dropdown-header bg-body-tertiary text-body-secondary fw-semibold rounded-top mb-2">Account</div>
                <a class="dropdown-item" href="#settings"><svg class="icon me-2"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-settings"></use></svg> Settings</a>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item" href="#" id="logoutBtn"><svg class="icon me-2"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-account-logout"></use></svg> Logout</a>
              </div>
            </li>
          </ul>
        </div>
        <div class="container-fluid px-4">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb my-0">
              <li class="breadcrumb-item active"><span>Dashboard</span></li>
            </ol>
          </nav>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <div class="body flex-grow-1">
        <div class="container-lg px-4">
          <!-- Stats Cards -->
          <div class="row g-4 mb-4" id="statsRow">
            <!-- Users -->
            <div class="col-sm-6 col-xl-3">
              <div class="card stat-card text-white bg-primary h-100">
                <div class="card-body d-flex align-items-center justify-content-between">
                  <div>
                    <div class="stat-value placeholder-glow" id="statUsers"><span class="placeholder col-6">&nbsp;</span></div>
                    <div class="stat-label">Total Users</div>
                  </div>
                  <svg class="stat-icon" style="width:48px;height:48px;"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-people"></use></svg>
                </div>
              </div>
            </div>
            <!-- Credits -->
            <div class="col-sm-6 col-xl-3">
              <div class="card stat-card text-white bg-info h-100">
                <div class="card-body d-flex align-items-center justify-content-between">
                  <div>
                    <div class="stat-value placeholder-glow" id="statCredits"><span class="placeholder col-6">&nbsp;</span></div>
                    <div class="stat-label">Total Credits</div>
                  </div>
                  <svg class="stat-icon" style="width:48px;height:48px;"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-chart-pie"></use></svg>
                </div>
              </div>
            </div>
            <!-- Orders -->
            <div class="col-sm-6 col-xl-3">
              <div class="card stat-card text-white bg-warning h-100">
                <div class="card-body d-flex align-items-center justify-content-between">
                  <div>
                    <div class="stat-value placeholder-glow" id="statOrders"><span class="placeholder col-6">&nbsp;</span></div>
                    <div class="stat-label">Total Orders</div>
                  </div>
                  <svg class="stat-icon" style="width:48px;height:48px;"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-cart"></use></svg>
                </div>
              </div>
            </div>
            <!-- Revenue -->
            <div class="col-sm-6 col-xl-3">
              <div class="card stat-card text-white bg-danger h-100">
                <div class="card-body d-flex align-items-center justify-content-between">
                  <div>
                    <div class="stat-value placeholder-glow" id="statRevenue"><span class="placeholder col-6">&nbsp;</span></div>
                    <div class="stat-label">Revenue (Credits)</div>
                  </div>
                  <svg class="stat-icon" style="width:48px;height:48px;"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-dollar"></use></svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer px-4">
        <div>Saad Studio &copy; 2025</div>
      </footer>
    </div>

    <script src="vendors/@coreui/coreui/js/coreui.bundle.min.js"></script>
    <script src="vendors/simplebar/js/simplebar.min.js"></script>
    <script>
      const header = document.querySelector('header.header');
      document.addEventListener('scroll', () => {
        if (header) header.classList.toggle('shadow-sm', document.documentElement.scrollTop > 0);
      });

      // Fetch real stats from API
      (async function loadStats() {
        try {
          const res = await fetch('/api/admin/stats', { credentials: 'same-origin' });
          if (!res.ok) throw new Error('Failed to load stats');
          const data = await res.json();

          document.getElementById('statUsers').textContent   = Number(data.totalUsers).toLocaleString();
          document.getElementById('statCredits').textContent  = Number(data.totalCredits).toLocaleString();
          document.getElementById('statOrders').textContent   = Number(data.totalOrders).toLocaleString();
          document.getElementById('statRevenue').textContent  = Number(data.totalRevenue).toLocaleString();
        } catch (err) {
          console.error('Stats load error:', err);
          document.querySelectorAll('.stat-value').forEach(el => {
            el.textContent = '—';
          });
        }
      })();
    </script>
  </body>
</html>
