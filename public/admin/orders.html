        <li class="nav-item"><a class="nav-link active" href="orders.html">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-cart"></use></svg> <span data-i18n="sidebar.orders">Orders</span></a></li>
        <li class="nav-item"><a class="nav-link" href="pages.html">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-file"></use></svg> <span data-i18n="sidebar.pages">Pages</span></a></li>
        <li class="nav-item"><a class="nav-link" href="media.html">
            <svg class="nav-icon"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-image"></use></svg> <span data-i18n="sidebar.media">Media</span></a></li>
        <li class="nav-item"><a class="nav-link" href="ads.html">

        <li class="nav-item"><a class="nav-link" href="settings.html">

        <li class="nav-item"><a class="nav-link" href="theme.html">

      </div>

    <!-- MAIN WRAPPER -->
    <div class="wrapper d-flex flex-column min-vh-100">
      <header class="header header-sticky p-0 mb-4">
        <div class="container-fluid border-bottom px-4">
          <button class="header-toggler" type="button" onclick="coreui.Sidebar.getInstance(document.querySelector('#sidebar')).toggle()" style="margin-inline-start: -14px;">
            <svg class="icon icon-lg"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-menu"></use></svg>
          </button>
          <ul class="header-nav d-none d-lg-flex">
            <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="header.dashboard">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="orders.html" data-i18n="header.orders">Orders</a></li>
          </ul>
          <ul class="header-nav ms-auto">
            <li class="nav-item"><a class="nav-link lang-switch-btn" href="#" id="langSwitchBtn">عربي</a></li>
            <li class="nav-item"><a class="nav-link" href="#">
                <svg class="icon icon-lg"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-bell"></use></svg></a></li>
          </ul>
          <ul class="header-nav">
            <li class="nav-item py-1"><div class="vr h-100 mx-2 text-body text-opacity-75"></div></li>
            <li class="nav-item dropdown">
              <button class="btn btn-link nav-link py-2 px-2 d-flex align-items-center" type="button" aria-expanded="false" data-coreui-toggle="dropdown">
                <svg class="icon icon-lg theme-icon-active"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-contrast"></use></svg>
              </button>
              <ul class="dropdown-menu dropdown-menu-end" style="--cui-dropdown-min-width: 8rem;">
                <li><button class="dropdown-item d-flex align-items-center" type="button" data-coreui-theme-value="light">
                    <svg class="icon icon-lg me-3"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-sun"></use></svg><span data-i18n="theme.light">Light</span></button></li>
                <li><button class="dropdown-item d-flex align-items-center" type="button" data-coreui-theme-value="dark">
                    <svg class="icon icon-lg me-3"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-moon"></use></svg><span data-i18n="theme.dark">Dark</span></button></li>
                <li><button class="dropdown-item d-flex align-items-center active" type="button" data-coreui-theme-value="auto">
                    <svg class="icon icon-lg me-3"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-contrast"></use></svg><span data-i18n="theme.auto">Auto</span></button></li>
              </ul>
            </li>
            <li class="nav-item py-1"><div class="vr h-100 mx-2 text-body text-opacity-75"></div></li>
            <li class="nav-item dropdown"><a class="nav-link py-0 pe-0" data-coreui-toggle="dropdown" href="#" role="button" aria-haspopup="true" aria-expanded="false">
                <div class="avatar avatar-md bg-primary text-white d-flex align-items-center justify-content-center rounded-circle" style="width:36px;height:36px;font-size:14px;">A</div></a>
              <div class="dropdown-menu dropdown-menu-end pt-0">
                <div class="dropdown-header bg-body-tertiary text-body-secondary fw-semibold rounded-top mb-2" data-i18n="account.label">Account</div>
                <a class="dropdown-item" href="settings.html"><svg class="icon me-2"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-settings"></use></svg> <span data-i18n="account.settings">Settings</span></a>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item" href="#" id="logoutBtn"><svg class="icon me-2"><use xlink:href="vendors/@coreui/icons/svg/free.svg#cil-account-logout"></use></svg> <span data-i18n="account.logout">Logout</span></a>
              </div>
            </li>
          </ul>
        </div>
        <div class="container-fluid px-4">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb my-0">
              <li class="breadcrumb-item"><a href="index.html" data-i18n="breadcrumb.home">Home</a></li>
              <li class="breadcrumb-item active"><span data-i18n="breadcrumb.orders">Orders</span></li>
            </ol>
          </nav>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <div class="body flex-grow-1">
        <div class="container-lg px-4">
          <div class="card mb-4">
            <div class="card-header d-flex flex-wrap align-items-center gap-2">
              <strong class="me-auto" data-i18n="orders.title">Orders Management</strong>
              <select class="form-select form-select-sm" id="statusFilter">
                <option value="" data-i18n="orders.allStatuses">All Statuses</option>
                <option value="pending" data-i18n="orders.pending">Pending</option>
                <option value="approved" data-i18n="orders.approved">Approved</option>
                <option value="rejected" data-i18n="orders.rejected">Rejected</option>
              </select>
              <input type="search" class="form-control form-control-sm" id="orderSearch" placeholder="Search by email..." data-i18n-placeholder="orders.searchPlaceholder">
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-hover table-striped align-middle mb-0" id="ordersTable">
                  <thead>
                    <tr>
                      <th data-i18n="orders.email">Email</th>
                      <th class="text-center" data-i18n="orders.type">Type</th>
                      <th class="text-center" data-i18n="orders.details">Details</th>
                      <th class="text-center" data-i18n="orders.status">Status</th>
                      <th data-i18n="orders.created">Created</th>
                      <th class="text-end" data-i18n="orders.actions">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="ordersBody">
                    <tr class="loading-row"><td colspan="6">
                      <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div> <span data-i18n="orders.loading">Loading orders...</span>
                    </td></tr>
                  </tbody>
                </table>
              </div>
            </div>
            <div class="card-footer small text-body-secondary" id="orderCount">—</div>
          </div>
        </div>
      </div>

      <footer class="footer px-4"><div data-i18n="footer.copy">Saad Studio © 2025</div></footer>
    </div>

    <!-- Toast -->
    <div class="toast-container">
      <div class="toast align-items-center text-bg-success border-0" id="toastOk" role="alert">
        <div class="d-flex"><div class="toast-body" id="toastMsg"></div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-coreui-dismiss="toast"></button>
        </div>
      </div>
    </div>

    <script src="vendors/@coreui/coreui/js/coreui.bundle.min.js"></script>
    <script src="vendors/simplebar/js/simplebar.min.js"></script>
    <script>
    (function(){
      let csrfToken = '';
      let allOrders = [];

      const header = document.querySelector('header.header');
      document.addEventListener('scroll', () => {
        if (header) header.classList.toggle('shadow-sm', document.documentElement.scrollTop > 0);
      });

      async function apiFetch(path, opts = {}) {
        const headers = { 'Content-Type': 'application/json', 'x-csrf-token': csrfToken, ...opts.headers };
        const r = await fetch(path, { ...opts, headers, credentials: 'same-origin' });
        if (r.status === 401) { window.location.href = '/'; return null; }
        return r;
      }

      function showToast(msg, type) {
        const el = document.getElementById('toastOk');
        el.className = 'toast align-items-center border-0 text-bg-' + (type || 'success');
        document.getElementById('toastMsg').textContent = msg;
        coreui.Toast.getOrCreateInstance(el).show();
      }

      async function init() {
        try {
          const r = await fetch('/api/admin/session', { credentials: 'same-origin' });
          if (!r.ok) { window.location.href = '/'; return; }
          const data = await r.json();
          csrfToken = data.csrfToken;
          await loadOrders();
        } catch (e) {
          document.getElementById('ordersBody').innerHTML =
            '<tr><td colspan="6" class="text-danger text-center">Failed to connect: ' + escHtml(e.message) + '</td></tr>';
        }
      }

      async function loadOrders() {
        const r = await apiFetch('/api/admin/orders');
        if (!r) return;
        const data = await r.json();
        allOrders = data.orders || [];
        applyFilters();
      }

      function applyFilters() {
        const q = document.getElementById('orderSearch').value.toLowerCase().trim();
        const st = document.getElementById('statusFilter').value;
        let filtered = allOrders;
        if (q) filtered = filtered.filter(o => (o.email || '').toLowerCase().includes(q));
        if (st) filtered = filtered.filter(o => o.status === st);
        renderOrders(filtered);
      }

      function renderOrders(orders) {
        const tbody = document.getElementById('ordersBody');
        if (!orders.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No orders found</td></tr>';
          document.getElementById('orderCount').textContent = '0 orders';
          return;
        }
        document.getElementById('orderCount').textContent = orders.length + ' order' + (orders.length > 1 ? 's' : '');
        tbody.innerHTML = orders.map(o => {
          const statusBg = o.status === 'approved' ? 'bg-success' : o.status === 'rejected' ? 'bg-danger' : 'bg-warning text-dark';
          const created = o.createdAt ? new Date(o.createdAt).toLocaleDateString() : '—';

          let details = '';
          if (o.type === 'plan') {
            details = escHtml((o.currentPlan || '?') + ' → ' + (o.newPlan || '?'));
          } else {
            details = o.pack + ' credits';
          }

          const typeBg = o.type === 'plan' ? 'bg-info text-white' : 'bg-primary';
          const isPending = o.status === 'pending';

          return '<tr>' +
            '<td>' + escHtml(o.email || '—') + '</td>' +
            '<td class="text-center"><span class="badge ' + typeBg + ' text-capitalize">' + escHtml(o.type || '—') + '</span></td>' +
            '<td class="text-center">' + details + '</td>' +
            '<td class="text-center"><span class="badge ' + statusBg + ' text-capitalize">' + escHtml(o.status) + '</span></td>' +
            '<td>' + created + '</td>' +
            '<td class="text-end table-actions">' +
              (isPending
                ? '<button class="btn btn-sm btn-outline-success me-1" onclick="app.approveOrder(\'' + o.id + '\')">Approve</button>' +
                  '<button class="btn btn-sm btn-outline-danger" onclick="app.rejectOrder(\'' + o.id + '\')">Reject</button>'
                : '<span class="text-body-secondary small">—</span>') +
            '</td></tr>';
        }).join('');
      }

      function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

      // Filters
      document.getElementById('orderSearch').addEventListener('input', applyFilters);
      document.getElementById('statusFilter').addEventListener('change', applyFilters);

      // Approve
      async function approveOrder(id) {
        if (!confirm('Approve this order?')) return;
        try {
          const r = await apiFetch('/api/admin/orders/' + encodeURIComponent(id) + '/approve', { method: 'POST' });
          if (!r) return;
          const data = await r.json();
          if (r.ok) {
            showToast('Order approved', 'success');
            await loadOrders();
          } else {
            showToast(data.error || 'Failed to approve', 'danger');
          }
        } catch (e) { showToast('Error: ' + e.message, 'danger'); }
      }

      // Reject
      async function rejectOrder(id) {
        if (!confirm('Reject this order?')) return;
        try {
          const r = await apiFetch('/api/admin/orders/' + encodeURIComponent(id) + '/reject', { method: 'POST' });
          if (!r) return;
          const data = await r.json();
          if (r.ok) {
            showToast('Order rejected', 'success');
            await loadOrders();
          } else {
            showToast(data.error || 'Failed to reject', 'danger');
          }
        } catch (e) { showToast('Error: ' + e.message, 'danger'); }
      }

      window.app = { approveOrder, rejectOrder };
      init();
    })();
    </script>
  </body>
</html>
