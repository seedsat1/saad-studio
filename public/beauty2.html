<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAAD STUDIO — Beauty & Model Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0a0f;--bg2:#110f17;--bg-card:#15131d;--bg-card-h:#1c1928;
  --rose:#d4a0b9;--rose-bright:#e8a0bf;--rose-g:rgba(232,160,191,.1);
  --gold:#c9a96e;--gold-bright:#dbb978;--gold-g:rgba(201,169,110,.1);
  --plum:#8e6b91;--coral:#c47a6a;--mint:#7ab8a0;
  --cream:#f0e4d4;--champagne:#e8d5c0;
  --txt:#ece3ef;--txt2:#978d9f;--txt3:#645b6c;
  --brd:rgba(255,255,255,.06);--brd-h:rgba(212,160,185,.3);
  --r:16px;--rs:10px;
  --far:'Cairo',sans-serif;--fen:'Cairo',sans-serif;--fser:Georgia,'Palatino Linotype',serif;
  --ease:all .35s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--far);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* AMBIENT */
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 500px 400px at 20% 10%,rgba(212,160,185,.04),transparent),
  radial-gradient(ellipse 500px 500px at 80% 80%,rgba(201,169,110,.03),transparent)}

/* HERO COVER */
.hero-cover{position:relative;z-index:2;max-width:1460px;margin:18px auto 0;padding:0 24px}
.hero-cover-card{position:relative;min-height:56vh;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.14);background:#0d1221}
.hero-cover-bg{position:absolute;inset:0;background:url('/img/beauty-hero.png') center/cover no-repeat;filter:saturate(1.05) contrast(1.05);transform:scale(1.02);pointer-events:none;user-select:none}
.hero-cover-card::before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,rgba(10,13,24,.72) 0%,rgba(10,13,24,.40) 38%,rgba(10,13,24,.20) 64%,rgba(10,13,24,.58) 100%),radial-gradient(ellipse at 18% 28%,rgba(43,178,255,.15),transparent 52%),radial-gradient(ellipse at 78% 72%,rgba(255,84,156,.13),transparent 56%)}
.hero-cover-inner{display:none}
.hero-copy{max-width:920px;margin:0 auto;text-align:center}
.hero-copy .hero-kicker{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.24);font-family:var(--fen);font-size:.72rem;text-transform:uppercase;letter-spacing:1px;background:rgba(7,12,25,.42)}
.hero-copy h2{margin-top:14px;font-family:var(--fser);font-size:clamp(2rem,5.8vw,4.25rem);line-height:1.05;font-weight:600;color:#f0e4d4;text-shadow:0 10px 26px rgba(0,0,0,.35)}
.hero-copy p{margin-top:12px;color:#dfd1dd;font-size:clamp(.95rem,1.8vw,1.3rem);max-width:840px;line-height:1.9}

/* HEADER */
.hdr{position:relative;z-index:2;padding:48px 40px 12px;text-align:center}
.hdr .st{font-family:var(--fen);font-size:.75rem;text-transform:uppercase;letter-spacing:5px;color:var(--gold);margin-bottom:14px;font-weight:600}
.hdr h1{font-family:var(--fser);font-size:clamp(2rem,5vw,3.6rem);font-weight:600;font-style:italic;
  background:linear-gradient(135deg,var(--rose-bright),var(--cream) 45%,var(--gold-bright));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.hdr p{font-size:.95rem;color:var(--txt2);max-width:520px;margin:0 auto;line-height:1.8}

/* DIVIDER */
.dv{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:16px;padding:20px 40px}
.dv::before,.dv::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.2),transparent)}
.dv span{font-family:var(--fser);font-size:.85rem;color:var(--gold);font-style:italic;white-space:nowrap}

/* CATEGORY TABS */
.tabs{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 20px 28px;flex-wrap:wrap}
.tab{font-family:var(--far);padding:10px 26px;border-radius:100px;border:1.5px solid var(--brd);background:transparent;color:var(--txt2);font-size:.88rem;font-weight:700;cursor:pointer;transition:var(--ease);display:flex;align-items:center;gap:8px}
.tab .cnt{font-family:var(--fen);font-size:.68rem;padding:2px 8px;border-radius:100px;background:rgba(255,255,255,.05);color:var(--txt3);transition:var(--ease)}
.tab:hover{border-color:var(--rose);color:var(--rose)}
.tab.on{border-color:var(--rose);color:var(--rose);background:var(--rose-g);box-shadow:0 0 20px rgba(212,160,185,.08)}
.tab.on .cnt{background:rgba(212,160,185,.2);color:var(--rose)}

/* TOOLS GRID */
.gw{position:relative;z-index:2;max-width:1440px;margin:0 auto;padding:0 24px 80px}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}

/* BOTTOM COVER */
.bottom-cover{
  position:relative;z-index:1;width:100vw;max-width:none;
  margin:-70px calc(50% - 50vw) 0;padding:0;overflow:hidden;pointer-events:none;
}
.bottom-cover-card{position:relative;background:transparent}
.bottom-cover-bg{
  position:relative;
  display:block;
  width:100%;
  aspect-ratio:2808/680;
  background:url('/img/beauty-bottom-transparent.png') center/contain no-repeat;
  opacity:1;
  pointer-events:none;
  user-select:none;
}

/* TOOL CARD */
.tc{
  position:relative;background:var(--bg-card);border:1px solid var(--brd);
  border-radius:var(--r);overflow:hidden;cursor:pointer;transition:var(--ease);
  animation:cI .5s ease both;
}
@keyframes cI{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.tc:hover{border-color:var(--brd-h);transform:translateY(-5px);box-shadow:0 16px 44px rgba(0,0,0,.45),0 0 24px rgba(212,160,185,.06)}

.tc .thumb{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.tc .thumb .ph-icon{font-size:2.8rem;opacity:.5}
.tc .thumb .ph-text{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--fen);font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);background:rgba(0,0,0,.5);padding:3px 10px;border-radius:100px;white-space:nowrap}
.tc .thumb .ovl{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg-card) 0%,transparent 40%)}
.tc .thumb img{width:100%;height:100%;object-fit:cover;pointer-events:none}

.tc .bd{position:absolute;top:10px;left:10px;padding:3px 10px;border-radius:100px;font-family:var(--fen);font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;z-index:2}
.b-h{background:var(--coral);color:#fff}
.b-n{background:var(--mint);color:var(--bg)}
.b-p{background:var(--rose);color:var(--bg)}

.tc .opts-count{position:absolute;top:10px;right:10px;padding:3px 10px;border-radius:100px;font-family:var(--fen);font-size:.6rem;font-weight:600;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:var(--txt2);z-index:2}

.tc .inf{padding:14px 16px 18px}
.tc .inf h3{font-family:var(--fser);font-size:1.1rem;font-weight:600;font-style:italic;margin-bottom:4px;color:var(--txt);transition:color .3s}
.tc:hover .inf h3{color:var(--rose)}
.tc .inf .ds{font-size:.78rem;color:var(--txt2);line-height:1.65}

/* Full-image card mode (image becomes full card background, text on top) */
.tc.bg-card-image{min-height:380px}
.tc.bg-card-image .thumb{aspect-ratio:auto;height:100%}
.tc.bg-card-image .thumb .ovl{
  background:linear-gradient(0deg,rgba(12,10,18,.96) 0%,rgba(12,10,18,.35) 42%,transparent 70%);
}
.tc.bg-card-image .inf{
  position:absolute;left:0;right:0;bottom:0;z-index:3;
  padding:18px 16px 18px;
  background:transparent;
}
.tc.bg-card-image .inf h3,.tc.bg-card-image .inf .ds{text-shadow:0 6px 18px rgba(0,0,0,.5)}

/* ═══════════════════════════════════════════ */
/* WORKSPACE OVERLAY                          */
/* ═══════════════════════════════════════════ */
.wo{position:fixed;inset:0;z-index:1000;background:rgba(7,6,11,.95);backdrop-filter:blur(24px);opacity:0;visibility:hidden;transition:all .4s ease;overflow-y:auto}
.wo.on{opacity:1;visibility:visible}
.ws{max-width:860px;margin:0 auto;padding:36px 28px 80px;transform:translateY(30px);transition:transform .4s cubic-bezier(.4,0,.2,1)}
.wo.on .ws{transform:translateY(0)}

.wb{display:inline-flex;align-items:center;gap:8px;font-family:var(--far);font-size:.88rem;color:var(--txt2);cursor:pointer;background:none;border:none;padding:8px 0;margin-bottom:20px;transition:color .3s}
.wb:hover{color:var(--rose)}
.wb svg{width:18px;height:18px;transform:scaleX(-1)}

.wh{text-align:center;margin-bottom:32px}
.wh h2{font-family:var(--fser);font-size:1.9rem;font-weight:600;font-style:italic;margin-bottom:8px;
  background:linear-gradient(135deg,var(--rose-bright),var(--cream));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wh p{color:var(--txt2);font-size:.88rem;line-height:1.7;max-width:500px;margin:0 auto}

/* STEP INDICATOR */
.steps{display:flex;align-items:center;justify-content:center;gap:32px;margin-bottom:32px}
.step{display:flex;align-items:center;gap:8px;font-family:var(--fen);font-size:.82rem;color:var(--txt3);font-weight:600}
.step .sn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;border:1.5px solid var(--brd);color:var(--txt3);transition:var(--ease)}
.step.active .sn{border-color:var(--rose);color:var(--bg);background:var(--rose)}
.step.active{color:var(--rose)}
.step.done .sn{border-color:var(--mint);color:var(--bg);background:var(--mint)}
.step.done{color:var(--mint)}
.steps .line{width:40px;height:1px;background:var(--brd)}

/* SECTION LABEL */
.sec-label{font-family:var(--fser);font-size:1.1rem;font-weight:600;font-style:italic;color:var(--txt);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--brd)}

/* UPLOAD ZONE */
.uz{
  position:relative;border:2px dashed rgba(212,160,185,.15);border-radius:var(--r);
  padding:40px 20px;text-align:center;cursor:pointer;transition:var(--ease);
  background:rgba(212,160,185,.02);min-height:180px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  margin-bottom:28px;
}
.uz:hover{border-color:var(--rose);background:var(--rose-g)}
.uz.hf{border-color:var(--mint);border-style:solid;background:rgba(122,184,160,.04)}
.uz svg{width:40px;height:40px;stroke:var(--txt3);fill:none;stroke-width:1.5}
.uz .ut{font-size:.85rem;color:var(--txt3)}.uz .ut strong{color:var(--rose);font-weight:600}
.uz .ux{font-size:.7rem;color:var(--txt3)}
.uz input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.uz .pi{max-width:100%;max-height:200px;border-radius:var(--rs);object-fit:contain;display:none}
.uz.hf svg,.uz.hf .ut,.uz.hf .ux{display:none}
.uz.hf .pi{display:block}

/* OPTIONS GRID — radio button image cards */
.opts-grid{
  display:flex;gap:12px;margin-bottom:28px;
  overflow-x:auto;overflow-y:hidden;padding-bottom:6px;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
}
.opts-grid.cols-3,.opts-grid.cols-4,.opts-grid.cols-5{display:flex}

.opt-card{
  position:relative;border:2px solid var(--brd);border-radius:var(--rs);
  overflow:hidden;cursor:pointer;transition:var(--ease);
  background:var(--bg2);
  min-width:190px;max-width:190px;flex:0 0 190px;scroll-snap-align:start;
}
.opt-card:hover{border-color:rgba(212,160,185,.25)}
.opt-card.selected{border-color:var(--rose);box-shadow:0 0 20px rgba(212,160,185,.15)}

.opt-card input[type="radio"]{position:absolute;opacity:0;pointer-events:none}

.opt-card .opt-img{
  width:100%;aspect-ratio:3/4;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.opt-card .opt-img img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.opt-card .opt-img .opt-ph{
  font-family:var(--fen);font-size:.6rem;text-transform:uppercase;
  letter-spacing:1px;color:var(--txt3);text-align:center;padding:8px;
}

.opt-card .opt-label{
  padding:8px 10px;text-align:center;
  border-top:1px solid var(--brd);
}
.opt-card .opt-label .opt-name{
  font-family:var(--fen);font-size:.78rem;font-weight:700;color:var(--txt);
  margin-bottom:2px;transition:color .3s;
}
.opt-card.selected .opt-label .opt-name{color:var(--rose)}
.opt-card .opt-label .opt-desc{
  font-size:.65rem;color:var(--txt3);line-height:1.4;
}

/* SELECTED CHECK */
.opt-card .check{
  position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;
  background:var(--rose);display:none;align-items:center;justify-content:center;z-index:2;
}
.opt-card .check svg{width:12px;height:12px;fill:#fff;stroke:none}
.opt-card.selected .check{display:flex}

/* GENERATE BTN */
.gb{
  width:100%;padding:16px;border:none;border-radius:var(--rs);
  background:linear-gradient(135deg,var(--rose-bright),#b87a9a);color:var(--bg);
  font-family:var(--fen);font-size:1.05rem;font-weight:700;cursor:pointer;
  transition:var(--ease);display:flex;align-items:center;justify-content:center;gap:10px;
}
.gb:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(212,160,185,.25)}
.gb:active{transform:translateY(0)}
.gb:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.gb svg{width:20px;height:20px}

/* RESULT */
.ra{margin-top:28px;display:none}.ra.vi{display:block}
.rl{text-align:center;padding:50px 20px;background:var(--bg-card);border-radius:var(--r);border:1px solid var(--brd)}
.sp{width:44px;height:44px;border-radius:50%;border:3px solid var(--brd);border-top-color:var(--rose);animation:sn 1s linear infinite;margin:0 auto 14px}
@keyframes sn{to{transform:rotate(360deg)}}
.rl p{color:var(--txt2);font-size:.88rem}
.ro{background:var(--bg-card);border-radius:var(--r);border:1px solid var(--brd);padding:20px;text-align:center}
.rx{display:flex;gap:10px;justify-content:center;margin-top:14px}
.rb{padding:10px 24px;border-radius:100px;font-family:var(--far);font-size:.82rem;font-weight:600;cursor:pointer;transition:var(--ease)}
.rdl{background:var(--rose);color:var(--bg);border:none}.rdl:hover{box-shadow:0 4px 18px rgba(212,160,185,.3)}
.rrt{background:transparent;color:var(--txt2);border:1.5px solid var(--brd)}.rrt:hover{border-color:var(--rose);color:var(--rose)}

@media(max-width:768px){
  .hero-cover{padding:0 12px}
  .hero-cover-card{min-height:48vh}
  .hero-cover-inner{display:none}
  .hdr{padding:32px 16px 8px}.hdr h1{font-size:1.7rem}
  .tabs{padding-left:12px;padding-right:12px}
  .gw{padding:0 12px 60px}
  .g{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .tc.bg-card-image{min-height:330px}
  .bottom-cover{margin:-56px calc(50% - 50vw) 0}
  .ws{padding:16px 14px 60px}
  .opt-card{min-width:165px;max-width:165px;flex-basis:165px}
  .steps{gap:16px}.steps .line{width:20px}
}
@media(max-width:480px){
  .opt-card{min-width:150px;max-width:150px;flex-basis:150px}
}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(212,160,185,.12);border-radius:3px}
</style>

</head>

  <div class="hero-cover-card">
    <div class="hero-cover-bg" aria-hidden="true"></div>
    <div class="hero-cover-inner">
      <div class="hero-copy">
        <span class="hero-kicker">SAAD STUDIO</span>
        <h2>Beauty &amp; Model Studio</h2>

      </div>

</section>

  <div class="dv"><span>✦ Choose Tool ✦</span></div>

<section class="bottom-cover no-media-actions" data-no-media-actions>
  <div class="bottom-cover-card">
    <div class="bottom-cover-bg" aria-hidden="true"></div>
  </div>
</section>

<div class="wo no-media-actions" id="wO" data-no-media-actions><div class="ws no-media-actions" id="wS" data-no-media-actions></div></div>

<script>
const LANG=document.documentElement.getAttribute('data-lang')==='ar'?'ar':'en';
const isAr=LANG==='ar';
function hasArabic(v){return /[\u0600-\u06FF]/.test(String(v||''));}
function locText(en,ar){return isAr?(ar||en):(en||ar);}
function locDesc(d,name){const x=String(d||'').trim();if(isAr)return x;return (x && !hasArabic(x))?x:`Generate ${name||'style'} output`;}
const TX={
  back:locText('Back','رجوع'),
  step1:locText('Upload image','ارفع الصورة'),

  clickUpload:locText('Click to upload your image','اضغط لرفع صورتك'),
  genBtn:locText('Generate','Generate — إنشاء'),
  processing:locText('Processing with AI...','جاري المعالجة بالذكاء الاصطناعي...'),
  options:locText('options','خيارات'),
  imageSoon:locText('Image coming soon','صورة قريباً'),
  uploadFail:locText('Image upload failed','فشل رفع الصورة'),
  verifyFail:locText('Failed to check status','فشل التحقق من الحالة'),
  genFail:locText('Generation failed','فشل الإنشاء'),
  timeout:locText('Timed out waiting for result','انتهت مهلة الانتظار'),
  startFail:locText('Unable to start generation','تعذر بدء التوليد'),
  invalidResult:locText('No valid output received','لم يتم استلام نتيجة صالحة'),
  success:locText('Created successfully!','تم الإنشاء بنجاح!'),
  download:locText('Download','تحميل'),
  retry:locText('Retry','إعادة'),
  cannot:locText('Unable to generate image','تعذر إنشاء الصورة'),
  unexpected:locText('Unexpected error','حدث خطأ غير متوقع'),
  generating:locText('Generating...','جاري الإنشاء...')
};
// ═══════════════════════════════════════════
// TOOLS DATABASE
// ═══════════════════════════════════════════
const TOOLS=[
// ─── OUTFIT (8) ───
{id:'outfit-change',name:'Outfit Change',ar:'تبديل الملابس',desc:'ارفع صورتك واختر ستايل الملابس',cat:'outfit',badge:'hot',optsCols:5,thumb:'/img/beauty-tools/outfit-change.png',thumbPos:'center center',thumbFit:'cover',thumbAspect:'1/1',fullCard:true,
  options:[
    {id:'casual',name:'Casual',nameAr:'كاجوال',desc:'ملابس يومية مريحة',img:''},
    {id:'elegant',name:'Elegant',nameAr:'أنيق',desc:'فساتين سهرة وأناقة',img:''},
    {id:'sport',name:'Sport',nameAr:'رياضي',desc:'ملابس رياضية',img:''},
    {id:'lingerie',name:'Lingerie',nameAr:'لانجري',desc:'ملابس داخلية أنيقة',img:''},
    {id:'formal',name:'Formal',nameAr:'رسمي',desc:'بدلة وملابس عمل',img:''},
    {id:'streetwear',name:'Streetwear',nameAr:'ستريت وير',desc:'ستايل شبابي عصري',img:''},
    {id:'boho',name:'Boho',nameAr:'بوهو',desc:'لوك بوهيمي ناعم',img:''},

function handleUpload(inp){
  const f=inp.files[0];if(!f)return;
  uploadedFile=f;
  const z=document.getElementById('upZ');z.classList.add('hf');
  const img=z.querySelector('.pi');
  img.onload=()=>{
    const w=img.naturalWidth||0,h=img.naturalHeight||0;
    const srcRatio = h ? (w/h) : (2/3);
    const maps=[
      {k:'1:1',v:1},
      {k:'2:3',v:2/3},
      {k:'3:2',v:3/2},
      {k:'9:16',v:9/16},
      {k:'16:9',v:16/9}
    ];
    uploadedRatio = maps.sort((a,b)=>Math.abs(a.v-srcRatio)-Math.abs(b.v-srcRatio))[0].k;
  };
  img.src=URL.createObjectURL(f);img.style.display='block';
  document.getElementById('s1').classList.remove('active');
  document.getElementById('s1').classList.add('done');
  document.getElementById('s2').classList.add('active');
  checkReady();
}

function selOpt(card,optId){
  document.querySelectorAll('.opt-card').forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected');
  card.querySelector('input').checked=true;
  selectedOpt=optId;
  checkReady();
}

function checkReady(){
  document.getElementById('gBtn').disabled=!(uploadedFile&&selectedOpt);
}

function selectedBeautyOption(){
  if(!currentTool||!selectedOpt) return null;
  return (currentTool.options||[]).find(o=>o.id===selectedOpt) || null;
}

function buildEditPrompt(tool,opt){
  const toolId=tool?.id||'';
  const optId=opt?.id||'';
  const toolP=BEAUTY_EDIT_PROMPTS[toolId]||{};
  const optName=(isAr?(opt?.nameAr||opt?.name):opt?.name)||'default';
  const base=toolP[optId]||`Same person as in the reference photo, with ${optName} style applied for ${tool?.name||'beauty'} transformation. Keep the exact same face and identity.`;
  return `${base} Photorealistic, high quality portrait photography.`;
}

async function fileToDataUrl(file){
  // Compress image to max 1536px and JPEG 0.85 quality to stay under Vercel 4.5MB limit
  return await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error(TX.uploadFail));
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1536;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = () => resolve(String(reader.result || ''));
      img.src = String(reader.result || '');
    };
    reader.readAsDataURL(file);
  });
}

function doGen(toolId){
  if(!uploadedFile||!selectedOpt)return;
  const b=document.getElementById('gBtn'),ra=document.getElementById('rA'),rl=document.getElementById('rL'),ro=document.getElementById('rO');
  b.disabled=true;b.innerHTML=`<div class="sp" style="width:20px;height:20px;border-width:2px;margin:0"></div> ${TX.generating}`;
  ra.classList.add('vi');rl.style.display='block';ro.style.display='none';
  document.getElementById('s2').classList.remove('active');
  document.getElementById('s2').classList.add('done');
  document.getElementById('s3').classList.add('active');

  (async()=>{
    try{
      const op = selectedBeautyOption();
      const imageUrl = await fileToDataUrl(uploadedFile);
      const prompt = buildEditPrompt(currentTool, op);
      const r = await fetch('/api/generate/image', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'include',
        body: JSON.stringify({
          modelId:'nano-banana-pro',
          prompt,
          imageUrl,
          imageInputField:'image_input',
          aspectRatio: uploadedRatio || '1:1',
          numImages: 1
        })
      });
      const d = await r.json();
      if(!r.ok) throw new Error(d.error || TX.startFail);
      const url = Array.isArray(d?.imageUrls) ? d.imageUrls[0] : null;
      if(!url) throw new Error(TX.invalidResult);

      rl.style.display='none';ro.style.display='block';
      ro.innerHTML=`<div style="padding:20px;text-align:center"><div style="font-family:var(--fser);font-size:1.3rem;font-style:italic;color:var(--rose);margin-bottom:8px">${TX.success}</div><a href="${url}" target="_blank" rel="noopener noreferrer"><img src="${url}" alt="result" style="max-width:100%;border-radius:12px;border:1px solid var(--brd);cursor:zoom-in"></a></div><div class="rx"><a class="rb rdl" href="${url}" download target="_blank" rel="noopener">${TX.download}</a><button class="rb rrt" onclick="doGen('${toolId}')">${TX.retry}</button></div>`;
    }catch(err){
      rl.style.display='none';ro.style.display='block';
      ro.innerHTML=`<div style="padding:32px;text-align:center"><div style="font-family:var(--fser);font-size:1.2rem;color:#ff8c9d;margin-bottom:8px">${TX.cannot}</div><p style="color:var(--txt2);font-size:.85rem">${(err&&err.message)?err.message:TX.unexpected}</p></div><div class="rx"><button class="rb rrt" onclick="doGen('${toolId}')">${TX.retry}</button></div>`;
    }finally{
      b.disabled=false;b.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg> ${TX.genBtn}`;
    }
  })();
}
</script>
<script>
  // Hard-disable any click/open behavior on hero/bottom covers.
  document.addEventListener('click', (e) => {
    const blocked = e.target.closest('.hero-cover,.bottom-cover');
    if (!blocked) return;
    if (e.target.closest('.tc,.tab,button,input,select,textarea,label,a')) return;
    e.preventDefault();
    e.stopImmediatePropagation();
  }, true);
</script>
</body>
</html>
