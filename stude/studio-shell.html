<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio Shell</title>
<style>
:root{--bg:#181818;--panel:#1e1e1e;--border:#2d2d2d;--text:#d4d4d4;--dim:#7f8b9e;--accent:#4a9eff;color-scheme:dark}
*{box-sizing:border-box;margin:0;padding:0}
*{scrollbar-width:thin;scrollbar-color:#3d4a62 #171b22}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:#171b22;border-left:1px solid #252d3a}
*::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#42526d,#344157);border:2px solid #171b22;border-radius:999px}
*::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#4e6283,#3d4f69)}
*::-webkit-scrollbar-corner{background:#171b22}
body{height:100vh;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,sans-serif;overflow:hidden;display:flex;flex-direction:column}
.brand-wrap{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#5bb2ff,#2f6cff);box-shadow:0 0 0 1px rgba(121,178,255,.35) inset,0 0 14px rgba(63,123,255,.25);position:relative;flex-shrink:0}
.brand-mark::after{content:'';position:absolute;inset:4px;border-radius:3px;border:1px solid rgba(225,240,255,.55)}
.brand-stack{display:flex;flex-direction:column;line-height:1}
.brand{color:#58acff;font-weight:800;letter-spacing:.9px;font-size:12px}
.brand-sub{color:#8ea2bf;font-size:10px;letter-spacing:.35px}
.sp{flex:1}
.tabs{height:34px;background:#1a1a1a;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:2px}
.tab{padding:7px 12px;border-bottom:2px solid transparent;color:var(--dim);text-decoration:none;font-size:11px;cursor:pointer}
.tab:hover{color:#dbe7ff}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topHost{flex:1 1 auto;min-height:240px;overflow:hidden;display:flex;min-width:0}
#toolHost{flex:1 1 auto;min-width:280px;overflow:hidden}
#topFrame{width:100%;height:100%;border:0;background:#1b1b1b;display:block}
#previewSplit{width:8px;cursor:col-resize;flex-shrink:0;background:#191c22;border-left:1px solid #2a2f38;border-right:1px solid #2a2f38;position:relative}
#previewSplit:hover,#previewSplit.dragging{background:#1f2530}
#previewSplit::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:2px;height:28px;background:#7e8da6;box-shadow:-4px 0 0 #7e8da6,4px 0 0 #7e8da6;border-radius:2px}
#previewPanel{width:420px;min-width:280px;max-width:55vw;background:#13161d;border-left:1px solid #2b313d;display:flex;flex-direction:column;overflow:hidden}
.pHead{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;border-bottom:1px solid #2a2f38;background:#141923;font-size:11px;gap:8px}
.pTitle{color:#b7d8ff;font-weight:700;letter-spacing:.6px}
.pActions{display:flex;align-items:center;gap:6px}
.pBody{flex:1;display:flex;flex-direction:column;padding:10px;gap:8px;overflow:hidden}
#previewStage{flex:1;min-height:0;position:relative;border:1px solid #2b3342;border-radius:8px;background:#0d121b;overflow:hidden}
#previewCanvas{background:linear-gradient(160deg,#0a0f18,#111d30 45%,#0c1220);border:1px solid #2b3342;border-radius:8px;display:flex;align-items:center;justify-content:center;position:absolute;overflow:hidden;cursor:zoom-in;left:50%;top:50%;transform:translate(-50%,-50%)}
#previewCanvas::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 35% 30%,rgba(74,158,255,.18),transparent 42%),radial-gradient(circle at 70% 65%,rgba(61,125,218,.14),transparent 38%)}
#previewLayers{position:absolute;inset:0;z-index:1;pointer-events:none}
.previewLayer{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.previewLayerMedia{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:transparent}
.previewLayerBlur{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(22px) brightness(0.7);transform:scale(1.08);pointer-events:none;background:transparent;display:none}
#previewAudio{position:absolute;left:10px;right:10px;bottom:10px;z-index:3;display:none}
#previewLabel{position:relative;z-index:2;font-size:13px;color:#cde2ff;background:rgba(8,12,18,.72);border:1px solid #2a3242;border-radius:6px;padding:6px 10px;max-width:90%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#previewProgress{height:6px;background:#212839;border-radius:999px;overflow:hidden;border:1px solid #2b3342;flex-shrink:0}
#previewProgress > div{height:100%;width:0;background:linear-gradient(90deg,#4a9eff,#72c3ff)}
#previewMeta{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;color:#96a9c3;flex-shrink:0}
#pTC{font-family:JetBrains Mono,Consolas,monospace;color:#d9ecff}
#previewExpand{border:1px solid #35435a;background:#1a2332;color:#b9d9ff;border-radius:5px;font-size:10px;padding:4px 8px;cursor:pointer}
#previewExpand:hover{border-color:#5ea9ff;color:#dff0ff}
#previewExport{border:1px solid #35435a;background:#121a27;color:#a9c9f2;border-radius:5px;font-size:10px;padding:4px 8px;cursor:pointer}
#previewExport:hover{border-color:#5ea9ff;color:#dff0ff}
#subtitleOverlay{
  display:none;
  position:absolute;
  bottom:6%;
  left:4%;
  right:4%;
  text-align:center;
  z-index:10;
  pointer-events:auto;
  font-size:clamp(12px,2vw,20px);
  line-height:1.55;
  color:#fff;
  font-weight:700;
  font-family:Inter,Segoe UI,sans-serif;
  white-space:pre-line;
  text-shadow:0 1px 6px #000,0 0 16px rgba(0,0,0,0.9),1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;
  background:rgba(0,0,0,0.55);
  border-radius:6px;
  padding:5px 14px 6px;
  max-width:92%;
  margin:0 auto;
  letter-spacing:0.2px;
  cursor:move;
}
.subCue{position:relative}
.subCue.editing{outline:2px dashed #4a9eff;outline-offset:2px}
.subCue[contenteditable="true"]{cursor:text;user-select:text}
.clipDragHandle{position:absolute;background:transparent;cursor:move;pointer-events:auto;z-index:9;box-sizing:border-box}
.clipDragHandle .dh-bounds{position:absolute;border:1px solid rgba(74,158,255,0.55);box-sizing:border-box;pointer-events:none}
.clipDragHandle .dh-anchor{position:absolute;width:9px;height:9px;background:#fff;border:1.5px solid #4a9eff;border-radius:50%;box-shadow:0 0 0 1px rgba(0,0,0,0.4);box-sizing:border-box;pointer-events:none;transform:translate(-50%,-50%)}
.clipDragHandle .dh-center{position:absolute;width:14px;height:14px;border:1.5px solid #ffb84a;border-radius:50%;box-sizing:border-box;pointer-events:none;transform:translate(-50%,-50%);background:rgba(255,184,74,0.15)}
.clipDragHandle .dh-center::before,.clipDragHandle .dh-center::after{content:'';position:absolute;background:#ffb84a}
.clipDragHandle .dh-center::before{left:50%;top:-4px;bottom:-4px;width:1px;transform:translateX(-50%)}
.clipDragHandle .dh-center::after{top:50%;left:-4px;right:-4px;height:1px;transform:translateY(-50%)}
.clipDragHandle .dh-label{position:absolute;background:#4a9eff;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap;font-family:Inter,sans-serif;pointer-events:none}
#splitter{height:8px;cursor:row-resize;flex-shrink:0;background:#191c22;border-top:1px solid #2a2f38;border-bottom:1px solid #2a2f38;position:relative}
#splitter:hover,#splitter.dragging{background:#1f2530}
#splitter::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30px;height:2px;background:#7e8da6;box-shadow:0 -4px 0 #7e8da6,0 4px 0 #7e8da6;border-radius:2px}
#timelineHost{height:260px;min-height:180px;flex:0 0 auto;border-top:1px solid var(--border);background:#151515}
#timelineFrame{width:100%;height:100%;border:0;display:block}
</style>
</head>
<body>

  <div class="tabs" id="tabs">
    <a class="tab" data-page="sound" href="#sound">Audio & Music</a>
    <a class="tab" data-page="captions" href="#captions">Captions</a>
    <a class="tab" data-page="video" href="#video">Video Generation</a>
    <a class="tab" data-page="presets" href="#presets">Generate Image</a>
    <a class="tab" data-page="transitions" href="#transitions">Transitions</a>
    <a class="tab" data-page="lighting" href="#lighting">Lighting</a>
    <a class="tab" data-page="prompt" href="#prompt">Prompt</a>
  </div>

  <div class="workspace" id="workspace">
    <div id="topHost">
      <div id="toolHost"><iframe id="topFrame" title="Top Workspace"></iframe></div>
      <div id="previewSplit" title="Resize preview panel"></div>
      <aside id="previewPanel">
        <div class="pHead">
          <span class="pTitle">Program Preview</span>
          <span id="pRatioLabel" style="color:#4a9eff;font-size:10px;font-weight:700;background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.2);border-radius:4px;padding:1px 7px;margin-left:6px;font-family:JetBrains Mono,monospace;flex-shrink:0">16:9</span>
          <span id="pPage" style="color:#8ea3bf;flex:1;text-align:right">Prompt</span>
          <div class="pActions">
            <button id="previewExport" title="Export active media">Export</button>
            <button id="renderBtn" title="Render full timeline to MP4" style="border:1px solid #3b5e35;background:#162412;color:#7ddc7d;border-radius:5px;font-size:10px;padding:4px 8px;cursor:pointer">&#9654; Render</button>
            <button id="previewExpand" title="Expand preview">Expand</button>
          </div>
        </div>
        <div class="pBody">
          <div id="previewStage">
            <div id="previewCanvas">
              <div id="previewLayers"></div>
              <audio id="previewAudio" controls></audio>
              <span id="previewLabel">No clip selected</span>
              <div id="subtitleOverlay"></div>
            </div>
          </div>
          <div id="previewProgress"><div id="previewProgressFill"></div></div>
          <div id="previewMeta">
            <span id="pTC">00:00:00:00</span>
            <span id="pPlay">Paused</span>
            <span id="pClip">No clip</span>
          </div>
        </div>
      </aside>
    </div>
    <div id="splitter"></div>
    <div id="timelineHost"><iframe id="timelineFrame" title="Timeline" src="timeline/index.html?v=jsx-10-shell"></iframe></div>
  </div>

<script>
(function(){
  // ── Forward projectId from shell URL to timeline iframe ──────────────────
  var _shellProjectId = new URLSearchParams(window.location.search).get('projectId') || '';
  if(_shellProjectId){
    var _tf = document.getElementById('timelineFrame');
    var _base = 'timeline/index.html?v=jsx-10-shell';
    _tf.src = _base + '&projectId=' + encodeURIComponent(_shellProjectId);
  }
  var PAGE_KEY='ff_shell_page';
  var H_KEY='ff_timeline_height';
  var PREVIEW_W_KEY='ff_preview_width';
  var MIN_TL=180;
  var MIN_TOP=240;
  var SPL=8;

  var tabs=[].slice.call(document.querySelectorAll('.tab'));
  var topFrame=document.getElementById('topFrame');
  var timelineHost=document.getElementById('timelineHost');
  var splitter=document.getElementById('splitter');
  var workspace=document.getElementById('workspace');
  var previewPanel=document.getElementById('previewPanel');
  var previewSplit=document.getElementById('previewSplit');
  var previewStage=document.getElementById('previewStage');
  var previewCanvas=document.getElementById('previewCanvas');
  var previewLayers=document.getElementById('previewLayers');
  var previewAudio=document.getElementById('previewAudio');
  var visualLayerMap={};
  var lastAudioKey='';
  var audioElMap={}; // multi-audio: clipId → { el: HTMLAudioElement, key: string }

  var pPage=document.getElementById('pPage');
  var pTC=document.getElementById('pTC');
  var pPlay=document.getElementById('pPlay');
  var pClip=document.getElementById('pClip');
  var pLabel=document.getElementById('previewLabel');
  var pFill=document.getElementById('previewProgressFill');
  var previewExpand=document.getElementById('previewExpand');
  var previewExport=document.getElementById('previewExport');
  var currentRatio='16:9';
  var lastTimelineState=null;
  var topFrameKeyHandlerBound=false;
  var liveLightingProfile=null;
  var liveLightingTargetId='';

  // ── Auto-save: relay debounced timeline state to parent page ──────────────
  var _autoSaveTimer=null;
  var _lastSentStateHash='';
  function relayStateToParent(state){
    if(!state || !window.parent || window.parent===window) return;
    // Only send if clips/tracks actually changed (cheap hash)
    var hash=JSON.stringify({clips:(state.clips||[]).length,tracks:(state.tracks||[]).length,ts:Math.floor(Date.now()/30000)});
    if(hash===_lastSentStateHash) return;
    _lastSentStateHash=hash;
    clearTimeout(_autoSaveTimer);
    _autoSaveTimer=setTimeout(function(){
      try{
        window.parent.postMessage({type:'ff:autosave-state', timelineState: state}, '*');
      }catch(_e){}
    }, 30000); // debounce 30 s — only send after 30s of no new changes
  }

  function pageLabel(page){
    var map={sound:'Audio & Music',captions:'Captions',video:'Video Generation',presets:'Generate Image',transitions:'Transitions',lighting:'Lighting',prompt:'Prompt'};
    return map[page] || 'Prompt';
  }

  function getPageFromLocation(){
    var q=new URLSearchParams(location.search).get('page');
    if(q) return q;
    var h=(location.hash||'').replace('#','').trim();
    if(h) return h;
    return localStorage.getItem(PAGE_KEY)||'prompt';
  }

  function setActive(page){
    tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.page===page); });
    pPage.textContent=pageLabel(page);
  }

  function loadPage(page,push){
    var allowed=['sound','captions','video','presets','transitions','lighting','prompt'];
    if(allowed.indexOf(page)===-1) page='prompt';
    setActive(page);
    localStorage.setItem(PAGE_KEY,page);
    var bust = Date.now();
    topFrame.src=page+'.html?embed=1&v='+bust;
    var url='studio-shell.html?page='+encodeURIComponent(page)+'#'+encodeURIComponent(page);
    if(push) history.pushState({page:page},'',url); else history.replaceState({page:page},'',url);
  }

  function postTimelineMessage(payload){
    try{
      var tf=document.getElementById('timelineFrame');
      if(tf && tf.contentWindow){
        tf.contentWindow.postMessage(payload, '*');
      }
    }catch(_e){}
  }

  function postTransportToggle(){
    postTimelineMessage({ type:'ff:transport-toggle' });
  }

  function isTimelineShortcutEvent(e){
    var code=String(e.code||'');
    var key=String(e.key||'');
    if(code==='Space' || key===' ' || key==='Spacebar' || e.keyCode===32 || e.which===32) return true;
    if(code==='Delete' || code==='Backspace') return true;
    if(code==='ArrowLeft' || code==='ArrowRight' || code==='Home' || code==='End') return true;
    var mod = !!(e.ctrlKey || e.metaKey);
    if(mod && !e.altKey && (code==='KeyZ' || code==='KeyY' || code==='KeyU')) return true;
    if(code==='KeyV' || code==='KeyT' || code==='KeyB' || code==='KeyS' || code==='KeyH' || code==='KeyA' || code==='KeyP' || code==='KeyN' || code==='KeyL' || code==='KeyU') return true;
    return false;
  }

  function forwardTimelineHotkey(e){
    if(!isTimelineShortcutEvent(e)) return false;
    postTimelineMessage({
      type:'ff:timeline-hotkey',
      event:{
        key:e.key,
        code:e.code,
        keyCode:e.keyCode||e.which||0,
        which:e.which||e.keyCode||0,
        ctrlKey:!!e.ctrlKey,
        metaKey:!!e.metaKey,
        altKey:!!e.altKey,
        shiftKey:!!e.shiftKey
      }
    });
    return true;
  }

  function bindTopFrameHotkeys(){
    if(!topFrame || !topFrame.contentWindow) return;
    var w=topFrame.contentWindow;
    if(w.__ffTimelineHotkeysBound) return;
    var onKey=function(e){
      if(isTypingTarget(e.target)) return;
      var isSpace=(e.code==='Space'||e.key===' '||e.key==='Spacebar'||e.keyCode===32||e.which===32);
      if(isSpace){
        e.preventDefault();
        e.stopPropagation();
        try{
          var ae=w.document.activeElement;
          if(ae && ae!==w.document.body && typeof ae.blur==='function'){
            var t=String(ae.tagName||'').toUpperCase();
            if(t==='BUTTON' || t==='A' || ae.getAttribute('role')==='button') ae.blur();
          }
        }catch(_e){}
        postTransportToggle();
        return;
      }
      if(forwardTimelineHotkey(e)){
        e.preventDefault();
      }
    };
    try{
      w.addEventListener('keydown', onKey, true);
      if(w.document) w.document.addEventListener('keydown', onKey, true);
      w.__ffTimelineHotkeysBound=true;
    }catch(_e){}
  }

  function maxTimeline(){
    return Math.max(MIN_TL,(workspace.clientHeight||window.innerHeight)-MIN_TOP-SPL);
  }

  function applyHeight(raw,persist){
    var h=Math.max(MIN_TL,Math.min(maxTimeline(),raw));
    timelineHost.style.height=h+'px';
    if(persist) localStorage.setItem(H_KEY,String(Math.round(h)));
  }

  function applyPreviewWidth(raw,persist){
    var maxW=Math.max(280, Math.floor(window.innerWidth*0.55));
    var minW=280;
    var w=Math.max(minW,Math.min(maxW,raw));
    previewPanel.style.width=w+'px';
    if(persist) localStorage.setItem(PREVIEW_W_KEY,String(Math.round(w)));
    fitPreview();
  }

  function ratioToWH(r){
    if(r==='9:16') return {w:9,h:16};
    if(r==='1:1') return {w:1,h:1};
    if(r==='4:3') return {w:4,h:3};
    if(r==='3:4') return {w:3,h:4};
    return {w:16,h:9};
  }

  function buildLightingFilter(profile){
    if(!profile || typeof profile!=='object') return '';
    var br = Number(profile.br); if(!Number.isFinite(br)) br = 50;
    var co = Number(profile.co); if(!Number.isFinite(co)) co = 50;
    var te = Number(profile.te); if(!Number.isFinite(te)) te = 50;
    var ex = Number(profile.ex); if(!Number.isFinite(ex)) ex = 50;
    var sa = Number(profile.sa); if(!Number.isFinite(sa)) sa = 50;
    var sp = Number(profile.sp); if(!Number.isFinite(sp)) sp = 50;
    var brightness = 1 + ((br - 50) / 100) * 0.7 + ((ex - 50) / 100) * 0.4;
    var contrast = 1 + ((co - 50) / 100) * 0.9 + ((sp - 50) / 100) * 0.25;
    var saturation = 1 + ((sa - 50) / 100) * 1.2;
    var hueRotate = Math.round((50 - te) * 0.8);
    var sepia = Math.max(0, (te - 50) / 180);
    brightness = Math.max(0.25, Math.min(2.2, brightness));
    contrast = Math.max(0.25, Math.min(2.2, contrast));
    saturation = Math.max(0.0, Math.min(2.5, saturation));

    return 'brightness(' + brightness.toFixed(3) + ') ' +
      'contrast(' + contrast.toFixed(3) + ') ' +
      'saturate(' + saturation.toFixed(3) + ') ' +
      'hue-rotate(' + hueRotate + 'deg) ' +
      'sepia(' + sepia.toFixed(3) + ')';
  }

  function fitPreview(){
    if(!previewStage || !previewCanvas) return;
    var rect=previewStage.getBoundingClientRect();
    var rw=ratioToWH(currentRatio).w;
    var rh=ratioToWH(currentRatio).h;
    var maxW=Math.max(0, rect.width-18);
    var maxH=Math.max(0, rect.height-18);
    if(maxW<=0 || maxH<=0) return;
    var width=maxW;
    var height=(width*rh)/rw;
    if(height>maxH){
      height=maxH;
      width=(height*rw)/rh;
    }
    previewCanvas.style.width=Math.floor(width)+'px';
    previewCanvas.style.height=Math.floor(height)+'px';
  }

  function disposeVisualLayer(entry){
    if(!entry) return;
    try{
      if(entry.media && entry.media.tagName==='VIDEO'){
        entry.media.pause();
        entry.media.removeAttribute('src');
      } else if(entry.media){
        entry.media.removeAttribute('src');
      }
    }catch(_e){}
    if(entry.node && entry.node.parentNode){
      entry.node.parentNode.removeChild(entry.node);
    }
  }

  function clearVisualLayers(){
    Object.keys(visualLayerMap).forEach(function(id){
      disposeVisualLayer(visualLayerMap[id]);
      delete visualLayerMap[id];
    });
  }

  function ensureVisualLayer(clip){
    var id=String(clip.id||'');
    var kind=String(clip.kind||'video').toLowerCase();
    var visualKind=(kind==='image' || kind==='psd') ? 'image' : 'video';
    var existing=visualLayerMap[id];
    if(existing && existing.visualKind!==visualKind){
      disposeVisualLayer(existing);
      delete visualLayerMap[id];
      existing=null;
    }
    if(!existing){
      var node=document.createElement('div');
      node.className='previewLayer';
      // blur background element for expand mode
      var blurEl;
      if(visualKind==='image'){
        blurEl=document.createElement('img');
        blurEl.alt='';
      } else {
        blurEl=document.createElement('video');
        blurEl.setAttribute('playsinline','');
        blurEl.muted=true;
        blurEl.volume=0;
      }
      blurEl.className='previewLayerBlur';
      blurEl.style.display='none';
      node.appendChild(blurEl);
      var media;
      if(visualKind==='image'){
        media=document.createElement('img');
        media.alt='Preview layer';
      } else {
        media=document.createElement('video');
        media.setAttribute('playsinline','');
        media.muted=true;
        media.volume=0;
      }
      media.className='previewLayerMedia';
      node.appendChild(media);
      previewLayers.appendChild(node);
      existing={ id:id, kind:kind, visualKind:visualKind, node:node, media:media, blurEl:blurEl, lastSrc:'', lastFitMode:'' };
      visualLayerMap[id]=existing;
    }
    return existing;
  }

  function clearPreviewMedia(){
    clearVisualLayers();
    // clear multi-audio
    Object.keys(audioElMap).forEach(function(id){
      var entry=audioElMap[id];
      if(entry&&entry.el){ try{ entry.el.pause(); entry.el.removeAttribute('src'); if(entry.el.parentNode) entry.el.parentNode.removeChild(entry.el); }catch(_e){} }
      delete audioElMap[id];
    });
    previewAudio.style.display='none';
    previewAudio.pause();
    previewAudio.removeAttribute('src');
    lastAudioKey='';
  }

  function syncAudioClips(clips, playing, frame){
    var desired=Array.isArray(clips)?clips.filter(function(c){return c&&c.url;}):
      (clips&&clips.url ? [clips] : []);
    var desiredIds={};
    desired.forEach(function(c){ desiredIds[String(c.id||'')]=true; });
    // Remove stale
    Object.keys(audioElMap).forEach(function(id){
      if(!desiredIds[id]){
        var e=audioElMap[id];
        if(e&&e.el){ try{ e.el.pause(); e.el.removeAttribute('src'); if(e.el.parentNode) e.el.parentNode.removeChild(e.el); }catch(_e){} }
        delete audioElMap[id];
      }
    });
    // Sync each
    desired.forEach(function(clip){
      var id=String(clip.id||'');
      var url=String(clip.url||'');
      var key=id+'|'+url;
      var entry=audioElMap[id];
      if(!entry){
        var el=document.createElement('audio');
        el.style.display='none'; el.preload='auto';
        document.body.appendChild(el);
        entry={el:el,key:''};
        audioElMap[id]=entry;
      }
      if(entry.key!==key){ entry.el.src=url; entry.key=key; }
      var vol=Number.isFinite(clip.trackVolume)?clip.trackVolume:1;
      entry.el.volume=Math.max(0,Math.min(1,vol));
      var audioTime=0;
      if(typeof frame==='number'&&typeof clip.start==='number'){
        audioTime=Math.max(0,(frame-clip.start)/30);
      }
      if(Number.isFinite(audioTime)&&Math.abs((entry.el.currentTime||0)-audioTime)>0.15){
        try{ entry.el.currentTime=audioTime; }catch(_e){}
      }
      if(playing){ entry.el.play().catch(function(){}); } else { entry.el.pause(); }
    });
    // Legacy single previewAudio fallback (keep hidden)
    previewAudio.style.display='none';
    if(!desired.length){ previewAudio.pause(); previewAudio.removeAttribute('src'); lastAudioKey=''; }
  }

  var SYSTEM_FONTS=new Set(['Inter','Segoe UI','Arial','Tahoma','Verdana','Helvetica','Times New Roman','Georgia','Courier New','Consolas','Impact']);
  var loadedFonts={};
  function ensureFontLoaded(family){
    if(!family) return;
    if(SYSTEM_FONTS.has(family)) return;
    if(loadedFonts[family]) return;
    loadedFonts[family]=true;
    var link=document.createElement('link');
    link.rel='stylesheet';
    link.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(family).replace(/%20/g,'+')+':wght@400;700&display=swap';
    document.head.appendChild(link);
  }

  function hex2rgba(hex, a){
    var h=String(hex||'#000000').replace('#','');
    if(h.length===3) h=h.split('').map(function(c){return c+c;}).join('');
    var n=parseInt(h,16);
    var r=(n>>16)&255, g=(n>>8)&255, b=n&255;
    var al=Math.max(0,Math.min(1, a==null?1:a));
    return 'rgba('+r+','+g+','+b+','+al+')';
  }

  function ensureSubtitleAnimStyle(){
    if(document.getElementById('subAnimStyle')) return;
    var s=document.createElement('style');
    s.id='subAnimStyle';
    s.textContent=''+
      '@keyframes subFadeIn{from{opacity:0}to{opacity:1}}'+
      '@keyframes subSlideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}'+
      '@keyframes subSlideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}'+
      '@keyframes subZoom{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}'+
      '@keyframes subGlow{0%,100%{text-shadow:0 0 8px currentColor}50%{text-shadow:0 0 22px currentColor,0 0 36px currentColor}}'+
      '@keyframes subBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}'+
      '@keyframes subShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}'+
      '@keyframes subTypewriter{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}'+
      '.subCue{display:inline-block;animation-fill-mode:both;animation-duration:0.45s}'+
      '.subCue.eff-fade{animation-name:subFadeIn}'+
      '.subCue.eff-slideUp{animation-name:subSlideUp}'+
      '.subCue.eff-slideDown{animation-name:subSlideDown}'+
      '.subCue.eff-zoom{animation-name:subZoom}'+
      '.subCue.eff-glow{animation:subGlow 1.6s ease-in-out infinite}'+
      '.subCue.eff-bounce{animation:subBounce 1s ease-in-out infinite}'+
      '.subCue.eff-shake{animation:subShake 0.4s ease-in-out infinite}'+
      '';
    document.head.appendChild(s);
  }

  function renderSubtitles(cues){
    var el=document.getElementById('subtitleOverlay');
    if(!el) return;
    if(!cues||!cues.length){ el.style.display='none'; el.innerHTML=''; return; }
    ensureSubtitleAnimStyle();

    // Use first cue for container-level positioning (bottom % + left/right shift)
    var first=cues[0]||{};
    var posY=Number(first.posY); if(!isFinite(posY)) posY=6;
    var posX=Number(first.posX); if(!isFinite(posX)) posX=0;
    var alignSelf=first.align||'center';
    el.style.bottom=posY+'%';
    el.style.left='4%';
    el.style.right='4%';
    el.style.textAlign=alignSelf;
    el.style.transform='translateX('+posX+'%)';
    // Reset container background so each cue carries its own
    el.style.background='transparent';
    el.style.padding='0';
    el.style.boxShadow='none';
    el.style.textShadow='none';

    var html=cues.map(function(c){
      var t=String(c.text||''); if(!t) return '';
      var color=c.textColor||'#ffffff';
      var fontFamily=c.fontFamily||'Inter';
      ensureFontLoaded(fontFamily);
      var fs=isFinite(Number(c.fontSize))?Number(c.fontSize):22;
      var bold=c.bold!==false;
      var italic=!!c.italic;
      var ul=!!c.underline;
      var bgEnabled=c.bgEnabled===true;
      var bgColor=c.bgColor||'#000000';
      var bgOp=isFinite(Number(c.bgOpacity))?Number(c.bgOpacity)/100:0.55;
      var stroke=Number(c.strokeWidth)||0;
      var strokeColor=c.strokeColor||'#000000';
      var shadow=c.shadow!==false;
      var op=isFinite(Number(c.opacity))?Number(c.opacity)/100:1;
      var effect=c.effect||'none';

      var styles=[];
      styles.push('color:'+color);
      styles.push('font-family:"'+fontFamily.replace(/"/g,'')+'",Inter,Segoe UI,sans-serif');
      styles.push('font-size:'+fs+'px');
      styles.push('font-weight:'+(bold?'700':'400'));
      if(italic) styles.push('font-style:italic');
      if(ul) styles.push('text-decoration:underline');
      styles.push('opacity:'+op);
      if(bgEnabled){
        styles.push('background:'+hex2rgba(bgColor, bgOp));
        styles.push('padding:4px 12px');
        styles.push('border-radius:6px');
      } else {
        styles.push('background:transparent');
        styles.push('padding:0 4px');
      }
      var shadows=[];
      if(shadow) shadows.push('0 2px 8px rgba(0,0,0,0.85)');
      if(stroke>0){
        // Build text-stroke via multi-shadow trick
        var n=Math.max(1,Math.round(stroke));
        for(var dx=-n; dx<=n; dx++){
          for(var dy=-n; dy<=n; dy++){
            if(dx===0&&dy===0) continue;
            shadows.push(dx+'px '+dy+'px 0 '+strokeColor);
          }
        }
      }
      if(shadows.length) styles.push('text-shadow:'+shadows.join(','));
      styles.push('margin:2px 0');
      styles.push('display:inline-block');
      styles.push('max-width:96%');
      styles.push('line-height:1.45');
      styles.push('white-space:pre-line');

      var cls='subCue';
      if(effect && effect!=='none') cls+=' eff-'+effect;
      var safe=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      // Typewriter effect: reveal characters via animation
      if(effect==='typewriter'){
        // Use clip-path animation with steps based on length
        styles.push('overflow:hidden');
        styles.push('animation: subTypewriter '+(0.05*safe.length).toFixed(2)+'s steps('+safe.length+') 1 both');
      }
      var cueId=String(c.id||'');
      return '<div class="'+cls+'" data-cue-id="'+cueId+'" data-pos-x="'+(Number(c.posX)||0)+'" data-pos-y="'+(Number(c.posY)||6)+'" title="Drag to move · Double-click to edit" style="'+styles.join(';')+'">'+safe+'</div>';
    }).filter(Boolean).join('');

    el.innerHTML=html;
    el.style.display='block';
    bindSubtitleInteractions();
  }

  // ─── Subtitle drag-to-move + double-click-to-edit ───
  function postToTimeline(msg){
    try{
      var tf=document.getElementById('timelineFrame');
      if(tf && tf.contentWindow) tf.contentWindow.postMessage(msg, '*');
    }catch(_e){}
  }

  function bindSubtitleInteractions(){
    var overlay=document.getElementById('subtitleOverlay');
    if(!overlay) return;
    var cues=overlay.querySelectorAll('.subCue');
    cues.forEach(function(node){
      if(node.__bound) return;
      node.__bound=true;
      var cueId=node.getAttribute('data-cue-id');

      // Single click → select in timeline
      node.addEventListener('mousedown', function(e){
        if(node.isContentEditable) return; // don't drag while editing
        if(e.button!==0) return;
        e.preventDefault();
        e.stopPropagation();
        if(cueId) postToTimeline({ type:'ff:selectClip', clipId:cueId });

        var stage=document.getElementById('previewStage');
        if(!stage) return;
        var rect=stage.getBoundingClientRect();
        var startX=e.clientX, startY=e.clientY;
        var startPosX=Number(node.getAttribute('data-pos-x'))||0;
        var startPosY=Number(node.getAttribute('data-pos-y'))||6;
        var moved=false;
        var lastPx=startPosX, lastPy=startPosY;

        function onMove(me){
          var dx=me.clientX-startX, dy=me.clientY-startY;
          if(!moved && Math.hypot(dx,dy)<3) return;
          moved=true;
          var pctX=startPosX + (dx/rect.width)*100;
          // posY is bottom% so dragging down DECREASES it
          var pctY=startPosY - (dy/rect.height)*100;
          pctX=Math.max(-50, Math.min(50, Math.round(pctX)));
          pctY=Math.max(0, Math.min(95, Math.round(pctY)));
          lastPx=pctX; lastPy=pctY;
          // Live visual feedback
          overlay.style.bottom=pctY+'%';
          overlay.style.transform='translateX('+pctX+'%)';
        }
        function onUp(){
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if(moved && cueId){
            postToTimeline({ type:'ff:setClipProp', clipId:cueId, key:'posX', value:lastPx, commit:true });
            postToTimeline({ type:'ff:setClipProp', clipId:cueId, key:'posY', value:lastPy, commit:true });
          }
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      // Double click → inline edit
      node.addEventListener('dblclick', function(e){
        e.preventDefault();
        e.stopPropagation();
        node.classList.add('editing');
        node.setAttribute('contenteditable','true');
        node.focus();
        // Select all
        try{
          var range=document.createRange();
          range.selectNodeContents(node);
          var sel=window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        }catch(_e){}

        function finish(commit){
          var newText=node.textContent||'';
          node.removeAttribute('contenteditable');
          node.classList.remove('editing');
          node.removeEventListener('blur', onBlur);
          node.removeEventListener('keydown', onKey);
          if(commit && cueId) postToTimeline({ type:'ff:setClipProp', clipId:cueId, key:'label', value:newText, commit:true });
        }
        function onBlur(){ finish(true); }
        function onKey(ev){
          if(ev.key==='Enter' && !ev.shiftKey){ ev.preventDefault(); node.blur(); }
          else if(ev.key==='Escape'){ ev.preventDefault(); finish(false); node.blur(); }
        }
        node.addEventListener('blur', onBlur);
        node.addEventListener('keydown', onKey);
      });
    });
  }

  // ─── Visual clip drag handles (logos, images, videos) ───
  var clipHandlesMap={};
  function clearClipHandles(){
    Object.keys(clipHandlesMap).forEach(function(id){
      var h=clipHandlesMap[id];
      if(h && h.parentNode) h.parentNode.removeChild(h);
      delete clipHandlesMap[id];
    });
  }
  function renderClipHandles(state){
    var stage=document.getElementById('previewStage');
    var canvas=document.getElementById('previewCanvas');
    if(!stage || !canvas){ clearClipHandles(); return; }
    var selectedId=state && state.selectedClip ? String(state.selectedClip.id||'') : '';
    var visuals=(state && Array.isArray(state.activeVisualClips)) ? state.activeVisualClips : [];
    var keep={};
    var sr=stage.getBoundingClientRect();
    var cr=canvas.getBoundingClientRect();
    visuals.forEach(function(clip){
      var id=String(clip.id||'');
      if(!id) return;
      if(id!==selectedId) return; // only show handle for selected clip
      keep[id]=true;
      var layer=visualLayerMap[id];
      if(!layer || !layer.node) return;
      var lr=layer.node.getBoundingClientRect();
      var h=clipHandlesMap[id];
      var bounds, lab, anchors=[], center;
      if(!h){
        h=document.createElement('div');
        h.className='clipDragHandle';
        bounds=document.createElement('div');
        bounds.className='dh-bounds';
        h.appendChild(bounds);
        // 8 anchor points: 4 corners + 4 edge midpoints
        for(var ai=0;ai<8;ai++){
          var dot=document.createElement('div');
          dot.className='dh-anchor';
          dot.dataset.idx=String(ai);
          h.appendChild(dot);
          anchors.push(dot);
        }
        center=document.createElement('div');
        center.className='dh-center';
        h.appendChild(center);
        lab=document.createElement('div');
        lab.className='dh-label';
        lab.textContent='⤢ '+(clip.label||'Clip');
        h.appendChild(lab);
        stage.appendChild(h);
        clipHandlesMap[id]=h;
        bindClipHandleDrag(h, id);
      } else {
        bounds=h.querySelector('.dh-bounds');
        lab=h.querySelector('.dh-label');
        center=h.querySelector('.dh-center');
        anchors=Array.prototype.slice.call(h.querySelectorAll('.dh-anchor'));
        if(lab) lab.textContent='⤢ '+(clip.label||'Clip');
      }
      // Drag area = entire preview canvas (free movement, no clipping)
      h.style.left=(cr.left-sr.left)+'px';
      h.style.top=(cr.top-sr.top)+'px';
      h.style.width=cr.width+'px';
      h.style.height=cr.height+'px';
      // Hide everything if image has zero rendered size (avoids stale dashed box)
      var hasSize=(lr.width>2 && lr.height>2);
      h.style.display=hasSize?'block':'none';
      // Inner thin border = actual image bounds (visual indicator only)
      var bx=lr.left-cr.left, by=lr.top-cr.top, bw=lr.width, bh=lr.height;
      if(bounds){
        bounds.style.left=bx+'px';
        bounds.style.top=by+'px';
        bounds.style.width=bw+'px';
        bounds.style.height=bh+'px';
      }
      // 8 anchor dots: 4 corners + 4 edge midpoints
      var pts=[
        [bx,by],[bx+bw/2,by],[bx+bw,by],
        [bx+bw,by+bh/2],
        [bx+bw,by+bh],[bx+bw/2,by+bh],[bx,by+bh],
        [bx,by+bh/2]
      ];
      for(var pi=0;pi<anchors.length && pi<pts.length;pi++){
        anchors[pi].style.left=pts[pi][0]+'px';
        anchors[pi].style.top=pts[pi][1]+'px';
      }
      // Center anchor (rotation/scale pivot)
      var mo=clip.motion||{};
      var axPct=(mo.ax!=null?mo.ax:50)/100;
      var ayPct=(mo.ay!=null?mo.ay:50)/100;
      if(center){
        center.style.left=(bx+bw*axPct)+'px';
        center.style.top=(by+bh*ayPct)+'px';
      }
      // Label hugs the image's top-left, clamped inside the handle
      if(lab){
        var labLeft=Math.max(0,Math.min(cr.width-60,bx));
        var labTop=Math.max(0,by-18);
        lab.style.left=labLeft+'px';
        lab.style.top=labTop+'px';
      }
      h.dataset.startPx=String(Number((clip.motion&&clip.motion.px)||0));
      h.dataset.startPy=String(Number((clip.motion&&clip.motion.py)||0));
    });
    Object.keys(clipHandlesMap).forEach(function(id){
      if(keep[id]) return;
      var n=clipHandlesMap[id];
      if(n && n.parentNode) n.parentNode.removeChild(n);
      delete clipHandlesMap[id];
    });
  }
  function bindClipHandleDrag(handle, clipId){
    handle.addEventListener('mousedown', function(e){
      if(e.button!==0) return;
      e.preventDefault();
      e.stopPropagation();
      postToTimeline({ type:'ff:selectClip', clipId:clipId });
      var startX=e.clientX, startY=e.clientY;
      var startPx=Number(handle.dataset.startPx)||0;
      var startPy=Number(handle.dataset.startPy)||0;
      var lastPx=startPx, lastPy=startPy;
      var moved=false;
      function onMove(me){
        var dx=me.clientX-startX, dy=me.clientY-startY;
        if(!moved && Math.hypot(dx,dy)<2) return;
        moved=true;
        lastPx=Math.round(startPx+dx);
        lastPy=Math.round(startPy+dy);
        // Live visual: also nudge the layer transform for instant feedback
        var layer=visualLayerMap[clipId];
        if(layer && layer.node) layer.node.style.transform='translate('+lastPx+'px,'+lastPy+'px)';
        // Move the dashed indicator + anchors with the image (delta from start)
        var deltaX=lastPx-startPx, deltaY=lastPy-startPy;
        var movables=handle.querySelectorAll('.dh-bounds,.dh-anchor,.dh-center,.dh-label');
        movables.forEach(function(node){
          if(!node.dataset.baseLeft){
            node.dataset.baseLeft=String(parseFloat(node.style.left)||0);
            node.dataset.baseTop=String(parseFloat(node.style.top)||0);
          }
          node.style.left=(parseFloat(node.dataset.baseLeft)+deltaX)+'px';
          node.style.top=(parseFloat(node.dataset.baseTop)+deltaY)+'px';
        });
      }
      function onUp(){
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        var movables=handle.querySelectorAll('.dh-bounds,.dh-anchor,.dh-center,.dh-label');
        movables.forEach(function(node){
          delete node.dataset.baseLeft; delete node.dataset.baseTop;
        });
        if(moved){
          postToTimeline({ type:'ff:setClipProp', clipId:clipId, key:'motion.px', value:lastPx, commit:true });
          postToTimeline({ type:'ff:setClipProp', clipId:clipId, key:'motion.py', value:lastPy, commit:true });
        }
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  function renderPreviewMedia(state, playing, frame){
    var visuals=(state && Array.isArray(state.activeVisualClips)) ? state.activeVisualClips.filter(function(c){ return !!(c && c.url); }) : [];
    var audioClip=(state && state.activeAudioClip && state.activeAudioClip.url) ? state.activeAudioClip : null;
    var audioClips=(state && Array.isArray(state.activeAudioClips)) ? state.activeAudioClips : (audioClip ? [audioClip] : []);
    var selectedClip=state && state.selectedClip ? state.selectedClip : null;

    if(!visuals.length){
      clearVisualLayers();
      syncAudioClips(audioClips, playing, frame);
      if(audioClip){
        pLabel.style.display='inline-block';
        pLabel.textContent=audioClip.label || 'Audio Clip';
      } else {
        pLabel.style.display='inline-block';
        pLabel.textContent='No clip selected';
      }
      return;
    }

    var desiredIds={};
    visuals.forEach(function(clip, idx){
      var id=String(clip.id||'');
      if(!id) return;
      desiredIds[id]=true;
      var layer=ensureVisualLayer(clip);
      if(!layer) return;
      layer.node.style.zIndex=String(1+idx);
      layer.node.style.display='block';
      var src=String(clip.url||'');
      var kind=String(clip.kind||'video').toLowerCase();
      var fitMode=String(clip.fitMode||'fit');
      var effectiveLighting = clip.lighting;
      if(liveLightingProfile){
        var liveTargetId = liveLightingTargetId ||
          (state && state.selectedClip && state.selectedClip.id) ||
          (state && state.activeVisualClip && state.activeVisualClip.id) || '';
        if(!liveTargetId || String(clip.id||'')===String(liveTargetId)){
          effectiveLighting = liveLightingProfile;
        }
      }
      // apply fitMode CSS
      if(fitMode==='fill' || fitMode==='crop'){
        layer.media.style.objectFit='cover';
      } else {
        layer.media.style.objectFit='contain';
      }
      // expand blur layer visibility
      var showBlur=(fitMode==='expand');
      if(layer.blurEl){
        layer.blurEl.style.display=showBlur ? 'block' : 'none';
        if(showBlur && layer.blurEl.src!==src) layer.blurEl.src=src;
      }

      // apply motion / opacity / blendMode / crop on the node
      var mo=clip.motion||{};
      var opacityVal=Number.isFinite(clip.opacity)?clip.opacity:100;
      var blendMode=String(clip.blendMode||'Normal');
      var cr=clip.cropRect||{};
      var px=Number.isFinite(mo.px)?mo.px:0;
      var py=Number.isFinite(mo.py)?mo.py:0;
      var sx=Number.isFinite(mo.sx)?mo.sx:100;
      var sy=Number.isFinite(mo.sy)?mo.sy:sx;
      var rot=Number.isFinite(mo.rot)?mo.rot:0;
      var ax=Number.isFinite(mo.ax)?mo.ax:50;
      var ay=Number.isFinite(mo.ay)?mo.ay:50;
      var hasMotion=(px!==0||py!==0||sx!==100||sy!==100||rot!==0||ax!==50||ay!==50);
      if(hasMotion){
        layer.node.style.transform='translate('+px+'px,'+py+'px)';
        layer.media.style.transformOrigin=ax+'% '+ay+'%';
        layer.media.style.transform='scale('+sx/100+','+sy/100+') rotate('+rot+'deg)';
      } else {
        layer.node.style.transform='';
        layer.media.style.transformOrigin='';
        layer.media.style.transform='';
      }
      layer.node.style.opacity=String(opacityVal/100);
      layer.node.style.mixBlendMode=blendMode==='Normal'?'':blendMode.toLowerCase().replace(' ','-');
      // crop via clip-path
      var cl=Number.isFinite(cr.l)?cr.l:0;
      var ct=Number.isFinite(cr.t)?cr.t:0;
      var cright=Number.isFinite(cr.r)?cr.r:0;
      var cb=Number.isFinite(cr.b)?cr.b:0;
      if(cl>0||ct>0||cright>0||cb>0){
        layer.node.style.clipPath='inset('+ct+'% '+(cright)+'% '+cb+'% '+cl+'%)';
      } else {
        layer.node.style.clipPath='';
      }

      if(kind==='image' || kind==='psd'){
        if(layer.lastSrc!==src){
          layer.media.src=src;
          layer.lastSrc=src;
        }
        layer.media.style.filter = buildLightingFilter(effectiveLighting);
      } else {
        if(layer.lastSrc!==src){
          layer.media.src=src;
          layer.lastSrc=src;
          // sync blur video src too
          if(layer.blurEl && layer.blurEl.tagName==='VIDEO') layer.blurEl.src=src;
        }
        var videoTime=0;
        if(typeof frame==='number' && typeof clip.start==='number'){
          videoTime=Math.max(0,(frame-clip.start)/30);
        }
        if(Number.isFinite(videoTime) && Math.abs((layer.media.currentTime||0)-videoTime)>0.18){
          try{ layer.media.currentTime=videoTime; }catch(_e){}
          if(showBlur && layer.blurEl && layer.blurEl.tagName==='VIDEO'){
            try{ layer.blurEl.currentTime=videoTime; }catch(_e){}
          }
        }
        if(playing){
          layer.media.play().catch(function(){});
          if(showBlur && layer.blurEl && layer.blurEl.tagName==='VIDEO') layer.blurEl.play().catch(function(){});
        } else {
          layer.media.pause();
          if(layer.blurEl && layer.blurEl.tagName==='VIDEO') layer.blurEl.pause();
        }
        layer.media.style.filter = buildLightingFilter(effectiveLighting);
      }
    });

    Object.keys(visualLayerMap).forEach(function(id){
      if(desiredIds[id]) return;
      disposeVisualLayer(visualLayerMap[id]);
      delete visualLayerMap[id];
    });

    syncAudioClips(audioClips, playing, frame);

    pLabel.style.display='none';
    if(selectedClip && selectedClip.kind==='audio'){
      pLabel.style.display='inline-block';
      pLabel.textContent=selectedClip.label || 'Audio Clip';
    }
  }

  function blendToComposite(bm){
    return {'Multiply':'multiply','Screen':'screen','Overlay':'overlay','Darken':'darken',
      'Lighten':'lighten','Color Dodge':'color-dodge','Color Burn':'color-burn',
      'Hard Light':'hard-light','Soft Light':'soft-light','Difference':'difference',
      'Exclusion':'exclusion','Hue':'hue','Saturation':'saturation',
      'Color':'color','Luminosity':'luminosity'}[bm]||'source-over';
  }

  function drawClipFrame(ctx, media, clip, W, H){
    var mo=clip.motion||{};
    var px=mo.px||0, py=mo.py||0;
    var sx=(mo.sx!=null?mo.sx:100)/100;
    var sy=(mo.sy!=null?mo.sy:100)/100;
    var rot=((mo.rot||0)*Math.PI)/180;
    var ax=(mo.ax!=null?mo.ax:50)/100;
    var ay=(mo.ay!=null?mo.ay:50)/100;
    var opacity=(clip.opacity!=null?clip.opacity:100)/100;
    var fit=clip.fitMode||'fit';
    var mW=media.videoWidth||media.naturalWidth||W;
    var mH=media.videoHeight||media.naturalHeight||H;
    if(!mW||!mH) return;
    ctx.save();
    ctx.globalAlpha=Math.max(0,Math.min(1,opacity));
    ctx.globalCompositeOperation=blendToComposite(clip.blendMode);
    // Crop
    var cr=clip.cropRect||{};
    var cL=(cr.l||0)/100,cT=(cr.t||0)/100,cR=(cr.r||0)/100,cB=(cr.b||0)/100;
    if(cL+cR+cT+cB>0){
      ctx.beginPath();
      ctx.rect(W*cL,H*cT,W*(1-cL-cR),H*(1-cT-cB));
      ctx.clip();
    }
    ctx.translate(W*ax+px, H*ay+py);
    ctx.rotate(rot);
    ctx.scale(sx,sy);
    var ox=-W*ax, oy=-H*ay;
    if(fit==='expand'){
      var bgS=Math.max(W/mW,H/mH)*1.08;
      ctx.save(); ctx.filter='blur(18px) brightness(0.7)';
      ctx.drawImage(media,ox+(W-mW*bgS)/2,oy+(H-mH*bgS)/2,mW*bgS,mH*bgS);
      ctx.restore();
      var fgS=Math.min(W/mW,H/mH);
      ctx.drawImage(media,ox+(W-mW*fgS)/2,oy+(H-mH*fgS)/2,mW*fgS,mH*fgS);
    } else if(fit==='fill'||fit==='crop'){
      var s=Math.max(W/mW,H/mH);
      ctx.drawImage(media,ox+(W-mW*s)/2,oy+(H-mH*s)/2,mW*s,mH*s);
    } else {
      var s2=Math.min(W/mW,H/mH);
      ctx.drawImage(media,ox+(W-mW*s2)/2,oy+(H-mH*s2)/2,mW*s2,mH*s2);
    }
    ctx.restore();
  }

  // ── Draw a single subtitle cue onto the render canvas ──────────
  function drawSubtitleFrame(ctx, cue, W, H){
    var text=String(cue.label||cue.text||''); if(!text) return;
    var fontFamily=cue.fontFamily||'Inter';
    try{ ensureFontLoaded(fontFamily); }catch(_e){}
    // Scale font: preview uses px on a smaller stage; multiply by H/720 so 1080p looks right
    var baseFs=isFinite(Number(cue.fontSize))?Number(cue.fontSize):22;
    var fs=Math.round(baseFs*(H/720));
    var bold=cue.bold!==false, italic=!!cue.italic;
    var color=cue.textColor||'#ffffff';
    var bgEnabled=cue.bgEnabled===true;
    var bgColor=cue.bgColor||'#000000';
    var bgOp=isFinite(Number(cue.bgOpacity))?Number(cue.bgOpacity)/100:0.55;
    var stroke=Number(cue.strokeWidth)||0;
    var strokeColor=cue.strokeColor||'#000000';
    var shadow=cue.shadow!==false;
    var op=isFinite(Number(cue.opacity))?Number(cue.opacity)/100:1;
    var align=cue.align||'center';
    var posX=Number(cue.posX)||0;
    var posY=isFinite(Number(cue.posY))?Number(cue.posY):6;
    var underline=!!cue.underline;

    ctx.save();
    ctx.globalAlpha=Math.max(0,Math.min(1,op));
    var weight=bold?'700':'400';
    var style=italic?'italic ':'';
    ctx.font=style+weight+' '+fs+'px "'+fontFamily.replace(/"/g,'')+'", Inter, "Segoe UI", sans-serif';
    ctx.textBaseline='alphabetic';

    // Layout: container = 92% width, centered, bottom anchored at posY% of H
    var marginX=W*0.04;
    var contW=W-marginX*2;
    // Wrap by spaces to fit 92% width
    var words=text.split(/\s+/);
    var lines=[]; var cur='';
    for(var wi=0;wi<words.length;wi++){
      var trial=cur?cur+' '+words[wi]:words[wi];
      if(ctx.measureText(trial).width>contW && cur){ lines.push(cur); cur=words[wi]; }
      else cur=trial;
    }
    if(cur) lines.push(cur);
    if(!lines.length) lines=[text];

    var lineH=Math.round(fs*1.45);
    var padX=bgEnabled?Math.round(fs*0.55):0;
    var padY=bgEnabled?Math.round(fs*0.25):0;
    var totalH=lines.length*lineH;
    // Bottom edge of last line
    var bottomY=H-(posY/100)*H;
    var firstBaseline=bottomY-totalH+Math.round(fs*0.95);
    var shiftX=(posX/100)*contW;

    for(var li=0;li<lines.length;li++){
      var line=lines[li];
      var tw=ctx.measureText(line).width;
      var x;
      if(align==='left') x=marginX+shiftX;
      else if(align==='right') x=W-marginX-tw+shiftX;
      else x=(W-tw)/2+shiftX;
      var baseY=firstBaseline+li*lineH;
      // Background box
      if(bgEnabled){
        var rgba=hex2rgba(bgColor,bgOp);
        ctx.fillStyle=rgba;
        var bgX=x-padX, bgY=baseY-Math.round(fs*0.95)-padY;
        var bgW=tw+padX*2, bgH=Math.round(fs*1.2)+padY*2;
        var r=Math.min(8,bgH/4);
        if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(bgX,bgY,bgW,bgH,r); ctx.fill(); }
        else { ctx.fillRect(bgX,bgY,bgW,bgH); }
      }
      // Shadow
      if(shadow){
        ctx.save();
        ctx.shadowColor='rgba(0,0,0,0.85)';
        ctx.shadowBlur=Math.round(fs*0.35);
        ctx.shadowOffsetY=Math.round(fs*0.1);
      }
      // Stroke (outline)
      if(stroke>0){
        ctx.strokeStyle=strokeColor;
        ctx.lineWidth=Math.max(1,Math.round(stroke*(H/720)*1.5));
        ctx.lineJoin='round';
        ctx.miterLimit=2;
        ctx.strokeText(line,x,baseY);
      }
      ctx.fillStyle=color;
      ctx.fillText(line,x,baseY);
      if(shadow) ctx.restore();
      if(underline){
        ctx.save();
        ctx.strokeStyle=color;
        ctx.lineWidth=Math.max(1,Math.round(fs*0.06));
        ctx.beginPath();
        ctx.moveTo(x,baseY+Math.round(fs*0.18));
        ctx.lineTo(x+tw,baseY+Math.round(fs*0.18));
        ctx.stroke();
        ctx.restore();
      }
    }
    ctx.restore();
  }

  // ── PRIMARY: GPU-accelerated WebCodecs render ───────────────────
  // Uses: VideoEncoder (H.264 hardware), OfflineAudioContext, mp4-muxer
  // Same pipeline as DaVinci/Premiere: GPU encodes each frame from Canvas
  async function renderFullVideo(){
    if(!lastTimelineState||!lastTimelineState.allClips||!lastTimelineState.allClips.length){
      pLabel.style.display='inline-block';
      pLabel.textContent='No clips in timeline to render.';
      return;
    }
    // Fallback to WASM if WebCodecs not supported
    if(typeof VideoEncoder==='undefined'||typeof AudioEncoder==='undefined'){
      return renderFullVideoWASM();
    }
    renderBtn.disabled=true;
    renderBtn.textContent='⏳ Rendering...';
    pLabel.style.display='inline-block';
    try{
      var FPS=30;
      var RATIO_MAP={'16:9':[1920,1080],'9:16':[1080,1920],'1:1':[1080,1080],'4:3':[1440,1080]};
      var dims=RATIO_MAP[currentRatio]||[1920,1080];
      var W=dims[0], H=dims[1];
      var allClips=lastTimelineState.allClips||[];
      var tracks=lastTimelineState.tracks||[];

      // Client-side render: blob: URLs work fine in the browser
      var videoClips=allClips.filter(function(c){
        var tr=tracks[c.track];
        return tr&&tr.type==='video'&&!tr.muted&&c.url;
      }).sort(function(a,b){return a.track-b.track||a.start-b.start;});

      var audioClips=allClips.filter(function(c){
        var tr=tracks[c.track];
        return tr&&tr.type==='audio'&&!tr.muted&&c.url;
      });

      // Subtitle cues (drawn on top of video each frame)
      var subtitleCues=allClips.filter(function(c){
        var tr=tracks[c.track];
        return tr&&tr.type==='subtitle'&&tr.visible!==false&&!tr.muted;
      });

      var maxEnd=allClips.reduce(function(a,c){return Math.max(a,c.start+c.dur);},0);
      var totalSec=Math.max(2,maxEnd/FPS);
      var totalFrames=Math.ceil(totalSec*FPS);

      // Load mp4-muxer (lightweight container writer)
      pLabel.textContent='Initialising encoder…';
      await loadRenderScript('https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.min.js');
      var Muxer=window.Mp4Muxer.Muxer;
      var ABT=window.Mp4Muxer.ArrayBufferTarget;
      var hasAudio=audioClips.length>0;

      var muxer=new Muxer({
        target:new ABT(),
        video:{codec:'avc',width:W,height:H},
        audio:hasAudio?{codec:'aac',sampleRate:44100,numberOfChannels:2}:undefined,
        fastStart:'in-memory'
      });

      // VideoEncoder — tries GPU (NVIDIA/AMD/Intel QuickSync) first
      var videoEncoder=new VideoEncoder({
        output:function(chunk,meta){muxer.addVideoChunk(chunk,meta);},
        error:function(e){throw e;}
      });
      var vcfg={codec:'avc1.640028',width:W,height:H,framerate:FPS,
        hardwareAcceleration:'prefer-hardware',bitrate:10000000};
      try{
        var chk=await VideoEncoder.isConfigSupported(vcfg);
        if(!chk.supported){
          vcfg.codec='avc1.42001f';
          vcfg.hardwareAcceleration='prefer-software';
        }
      }catch(e){ vcfg.codec='avc1.42001f'; }
      videoEncoder.configure(vcfg);

      // Load all visual media into HTMLVideoElement / HTMLImageElement
      pLabel.textContent='Loading media…';
      var mediaCache={};
      var uniqueUrls=[...new Set(videoClips.map(function(c){return c.url;}))];
      for(var ui=0;ui<uniqueUrls.length;ui++){
        var url=uniqueUrls[ui];
        pLabel.textContent='Loading '+(ui+1)+'/'+uniqueUrls.length+'…';
        try{
          var ext=url.split('?')[0].split('.').pop().toLowerCase();
          var imgExts=['jpg','jpeg','png','webp','gif','bmp','svg','avif'];
          // Detect kind from clip data when extension is missing (blob: URLs)
          var clipForUrl=videoClips.find(function(c){return c.url===url;});
          var clipKind=String((clipForUrl&&clipForUrl.kind)||'').toLowerCase();
          var isImg=imgExts.includes(ext)
            || clipKind==='image'||clipKind==='psd'||clipKind==='logo'
            || (clipForUrl && clipForUrl.url && /^data:image\//i.test(clipForUrl.url));
          if(isImg){
            var img=new Image();
            img.crossOrigin='anonymous';
            await new Promise(function(res,rej){img.onload=res;img.onerror=rej;img.src=url;});
            mediaCache[url]=img;
          } else {
            var vid=document.createElement('video');
            vid.crossOrigin='anonymous'; vid.preload='auto'; vid.muted=true;
            await new Promise(function(res,rej){vid.onloadedmetadata=res;vid.onerror=rej;vid.src=url;});
            mediaCache[url]=vid;
          }
        }catch(le){console.warn('[render] load fail:',url,le);}
      }

      // Frame-by-frame render onto OffscreenCanvas (GPU composited by browser)
      var offscreen=new OffscreenCanvas(W,H);
      var ctx=offscreen.getContext('2d');

      for(var f=0;f<totalFrames;f++){
        var t=f/FPS;
        ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

        var visible=videoClips.filter(function(c){
          return t>=c.start/FPS && t<(c.start+c.dur)/FPS;
        });

        for(var ci=0;ci<visible.length;ci++){
          var clip=visible[ci];
          var media=mediaCache[clip.url];
          if(!media) continue;
          if(media.tagName==='VIDEO'){
            var seekT=t-clip.start/FPS;
            if(Math.abs(media.currentTime-seekT)>1.5/FPS){
              media.currentTime=seekT;
              await new Promise(function(res){
                media.onseeked=res; setTimeout(res,600);
              });
            }
          }
          try{drawClipFrame(ctx,media,clip,W,H);}catch(de){console.warn(de);}
        }

        // Draw active subtitles on top
        if(subtitleCues.length){
          var activeSubs=subtitleCues.filter(function(c){
            return t>=c.start/FPS && t<(c.start+c.dur)/FPS;
          });
          for(var si=0;si<activeSubs.length;si++){
            try{drawSubtitleFrame(ctx,activeSubs[si],W,H);}catch(se){console.warn('[render sub]',se);}
          }
        }

        // VideoFrame → hardware encoder
        var bitmap=await createImageBitmap(offscreen);
        var vf=new VideoFrame(bitmap,{
          timestamp:Math.floor(f*1000000/FPS),
          duration:Math.floor(1000000/FPS)
        });
        videoEncoder.encode(vf,{keyFrame:f%(FPS*2)===0});
        vf.close(); bitmap.close();

        if(f%5===0){
          pLabel.textContent='🎬 GPU Rendering '+Math.round(f/totalFrames*100)+'%  ('+f+'/'+totalFrames+' frames)';
          await new Promise(function(r){setTimeout(r,0);}); // yield UI
        }
      }

      pLabel.textContent='Flushing video encoder…';
      await videoEncoder.flush();

      // Audio: OfflineAudioContext mixes all tracks, AudioEncoder encodes to AAC
      if(hasAudio){
        pLabel.textContent='Mixing audio…';
        var SR=44100;
        var offAudio=new OfflineAudioContext(2,Math.ceil(totalSec*SR),SR);
        for(var ai=0;ai<audioClips.length;ai++){
          var ac=audioClips[ai];
          if(!ac.url) continue;
          try{
            var resp=await fetch(ac.url);
            var ab2=await resp.arrayBuffer();
            var abuf=await offAudio.decodeAudioData(ab2);
            var atr=(tracks[ac.track]||{});
            var gn=offAudio.createGain();
            gn.gain.value=(atr.volume!=null)?atr.volume:1;
            var asrc=offAudio.createBufferSource();
            asrc.buffer=abuf;
            asrc.connect(gn); gn.connect(offAudio.destination);
            asrc.start(ac.start/FPS, 0, ac.dur/FPS);
          }catch(aerr){console.warn('[render] audio err:',aerr);}
        }
        var rendered=await offAudio.startRendering();

        var audioEnc=new AudioEncoder({
          output:function(chunk,meta){muxer.addAudioChunk(chunk,meta);},
          error:function(e){console.warn('[render] audio encode:',e);}
        });
        audioEnc.configure({codec:'mp4a.40.2',sampleRate:SR,numberOfChannels:2,bitrate:192000});

        var L=rendered.getChannelData(0);
        var R=rendered.numberOfChannels>1?rendered.getChannelData(1):L;
        var ACHUNK=SR; // 1 second chunks
        for(var i=0;i<rendered.length;i+=ACHUNK){
          var len=Math.min(ACHUNK,rendered.length-i);
          var buf=new Float32Array(len*2);
          for(var j=0;j<len;j++){buf[j]=L[i+j]; buf[len+j]=R[i+j];}
          var ad=new AudioData({
            format:'f32-planar',sampleRate:SR,numberOfFrames:len,
            numberOfChannels:2,timestamp:Math.floor(i*1000000/SR),data:buf
          });
          audioEnc.encode(ad); ad.close();
        }
        await audioEnc.flush();
      }

      muxer.finalize();
      var buffer=muxer.target.buffer;
      var outBlob=new Blob([buffer],{type:'video/mp4'});
      var outUrl=URL.createObjectURL(outBlob);
      var a=document.createElement('a');
      a.href=outUrl; a.download='render_'+Date.now()+'.mp4';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){URL.revokeObjectURL(outUrl);},5000);
      pLabel.textContent='✓ Export complete! (GPU-accelerated H.264)';

    }catch(e){
      pLabel.textContent='Render error: '+(e&&e.message?e.message:String(e));
      console.error('[render WebCodecs]',e);
    }finally{
      renderBtn.disabled=false;
      renderBtn.textContent='► Render';
    }
  }

  // ── FALLBACK: FFmpeg WASM (browsers without WebCodecs) ──────────
  async function renderFullVideoWASM(){
    renderBtn.disabled=true;
    renderBtn.textContent='⏳ Rendering (WASM)...';
    pLabel.style.display='inline-block';
    pLabel.textContent='Loading FFmpeg WASM…';
    try{
      if(!window._FFmpegLib){
        await loadRenderScript('https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js');
        window._FFmpegLib=window.FFmpeg;
      }
      var createFFmpeg=window._FFmpegLib.createFFmpeg;
      var fetchFile=window._FFmpegLib.fetchFile;
      var ffmpeg=createFFmpeg({log:false,
        corePath:'https://unpkg.com/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.js',
        progress:function(p){pLabel.textContent='WASM Encoding: '+Math.round((p.ratio||0)*100)+'%';}
      });
      pLabel.textContent='Loading WASM core…';
      await ffmpeg.load();
      var RATIO_MAP={'16:9':[1920,1080],'9:16':[1080,1920],'1:1':[1080,1080],'4:3':[1440,1080]};
      var dims=RATIO_MAP[currentRatio]||[1920,1080];
      var W=dims[0],H=dims[1],FPS=30;
      var allClips=lastTimelineState.allClips||[];
      var tracks=lastTimelineState.tracks||[];
      var videoClips=allClips.filter(function(c){var tr=tracks[c.track];return tr&&tr.type==='video'&&!tr.muted&&c.url;}).sort(function(a,b){return a.start-b.start;});
      var audioClips=allClips.filter(function(c){var tr=tracks[c.track];return tr&&tr.type==='audio'&&!tr.muted&&c.url;}).sort(function(a,b){return a.start-b.start;});
      var uniqueUrls=[...new Set([...videoClips,...audioClips].map(function(c){return c.url;}))];
      var urlToFile={};
      for(var i=0;i<uniqueUrls.length;i++){
        pLabel.textContent='Downloading '+(i+1)+'/'+uniqueUrls.length+'…';
        try{
          var url=uniqueUrls[i];
          var ext=(url.split('?')[0].split('.').pop()||'mp4').toLowerCase().slice(0,4);
          var fname='inp'+i+'.'+ext;
          ffmpeg.FS('writeFile',fname,await fetchFile(url));
          urlToFile[url]=fname;
        }catch(fe){console.warn('[WASM] fetch fail:',fe);}
      }
      var localFiles=[...new Set(Object.values(urlToFile))];
      var urlToIdx={};
      Object.keys(urlToFile).forEach(function(u){urlToIdx[u]=localFiles.indexOf(urlToFile[u]);});
      var maxEnd=allClips.reduce(function(a,c){return Math.max(a,c.start+c.dur);},0);
      var totalSec=Math.max(3,(maxEnd/FPS)).toFixed(3);
      var fp=[];
      fp.push('nullsrc=s='+W+'x'+H+':d='+totalSec+':r='+FPS+',format=yuv420p[base]');
      var curV='base',vi=0;
      for(var ci=0;ci<videoClips.length;ci++){
        var clip=videoClips[ci];
        var idx=urlToIdx[clip.url];
        if(idx===undefined)continue;
        var cs=(clip.start/FPS).toFixed(3),cd=(clip.dur/FPS).toFixed(3),ce=((clip.start+clip.dur)/FPS).toFixed(3);
        var vTag='vcl'+vi,fit=clip.fitMode||'fit';
        var sf=fit==='fill'||fit==='crop'?'scale='+W+':'+H+':force_original_aspect_ratio=increase,crop='+W+':'+H+',format=yuv420p':'scale='+W+':'+H+':force_original_aspect_ratio=decrease,pad='+W+':'+H+':-1:-1,format=yuv420p';
        fp.push('['+idx+':v]trim=duration='+cd+',setpts=PTS-STARTPTS+'+cs+'/TB,'+sf+'['+vTag+']');
        var cT='comp'+vi;
        fp.push('['+curV+']['+vTag+']overlay=enable=\'between(t,'+cs+','+ce+')\':shortest=0['+cT+']');
        curV=cT; vi++;
      }
      var aTags=[],ai=0;
      for(var ai2=0;ai2<audioClips.length;ai2++){
        var ac=audioClips[ai2],aidx=urlToIdx[ac.url];
        if(aidx===undefined)continue;
        var atr=tracks[ac.track],vol=(atr&&atr.volume!=null)?atr.volume:1;
        var aTag='acl'+ai;
        fp.push('['+aidx+':a]atrim=duration='+(ac.dur/FPS).toFixed(3)+',asetpts=PTS-STARTPTS,adelay='+Math.round(ac.start/FPS*1000)+'|'+Math.round(ac.start/FPS*1000)+',volume='+vol.toFixed(3)+'['+aTag+']');
        aTags.push('['+aTag+']'); ai++;
      }
      var audioOut='';
      if(aTags.length>1){audioOut='aout';fp.push(aTags.join('')+'amix=inputs='+aTags.length+':duration=longest['+audioOut+']');}
      else if(aTags.length===1){audioOut=aTags[0].slice(1,-1);}
      pLabel.textContent='WASM Encoding…';
      var args=[];
      localFiles.forEach(function(f){args.push('-i',f);});
      args.push('-filter_complex',fp.join('; '),'-map','['+curV+']');
      if(audioOut)args.push('-map','['+audioOut+']');
      args.push('-c:v','libx264','-preset','ultrafast','-crf','23','-c:a','aac','-b:a','192k','-movflags','+faststart','-y','output.mp4');
      await ffmpeg.run.apply(ffmpeg,args);
      var data=ffmpeg.FS('readFile','output.mp4');
      var outBlob=new Blob([data.buffer],{type:'video/mp4'});
      var outUrl=URL.createObjectURL(outBlob);
      var a=document.createElement('a');a.href=outUrl;a.download='render_'+Date.now()+'.mp4';
      document.body.appendChild(a);a.click();a.remove();
      setTimeout(function(){URL.revokeObjectURL(outUrl);},5000);
      pLabel.textContent='✓ WASM render complete!';
    }catch(e){
      pLabel.textContent='WASM Render error: '+(e&&e.message?e.message:String(e));
      console.error('[WASM render]',e);
    }finally{
      renderBtn.disabled=false;
      renderBtn.textContent='► Render';
    }
  }

  renderBtn.addEventListener('click', renderFullVideo);

  function isTypingTarget(el){
    if(!el) return false;
    var tag=String(el.tagName||'').toUpperCase();
    if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return true;
    if(el.isContentEditable) return true;
    return false;
  }


  window.addEventListener('keydown', function(e){
    if(isTypingTarget(e.target)) return;
    // Space = play/pause (most important shortcut)
    var isSpace=(e.code==='Space'||e.key===' '||e.key==='Spacebar'||e.keyCode===32||e.which===32);
    if(isSpace){
      e.preventDefault();
      e.stopPropagation();
      // Blur any focused button so Space doesn't ALSO trigger its click → double-toggle
      try{
        var ae=document.activeElement;
        if(ae && ae!==document.body && typeof ae.blur==='function'){
          var t=String(ae.tagName||'').toUpperCase();
          if(t==='BUTTON' || t==='A' || ae.getAttribute('role')==='button') ae.blur();
        }
      }catch(_e){}
      // Send transport-toggle directly (most reliable path)
      postTransportToggle();
      return;
    }
    if(forwardTimelineHotkey(e)){
      e.preventDefault();
    }
  }, true);

  topFrame.addEventListener('load', function(){
    bindTopFrameHotkeys();
    // Send current timeline state to the newly loaded tool page
    if(lastTimelineState && topFrame.contentWindow){
      try{ topFrame.contentWindow.postMessage(lastTimelineState,'*'); }catch(_e){}
    }
  });

  loadPage(getPageFromLocation(),false);
  bindTopFrameHotkeys();
  fitPreview();
})();
</script>
